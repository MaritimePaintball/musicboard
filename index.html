<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
// Canvas constants — declared early so all functions can reference them
const CANVAS_SIZE = 8000;
const PAN_MARGIN  = 100; // minimum px of canvas visible at each edge (screen-space)

// ── Free version limits ──────────────────────────────────
function liveFrameCount()    { return document.querySelectorAll('.sb-frame').length; }
function liveWaveformCount() { return document.querySelectorAll('.waveform-block').length; }

// Easter egg — triggered if someone bypasses the limits via dev tools
function checkEasterEgg() {
  if (liveFrameCount() > 10 || liveWaveformCount() > 2) {
    showEasterEgg();
  }
}

function showEasterEgg() {
  const existing = document.getElementById('easter-egg-modal');
  if (existing) return;
  const modal = document.createElement('div');
  modal.id = 'easter-egg-modal';
  modal.innerHTML = `
    <div id="easter-egg-box">
      <div id="easter-egg-emoji">👀</div>
      <div id="easter-egg-title">Well, well, well…</div>
      <div id="easter-egg-msg">It's not nice to snoop in someone's stuff.</div>
      <button id="easter-egg-close">Fair enough 😅</button>
    </div>
  `;
  document.body.appendChild(modal);
  document.getElementById('easter-egg-close').addEventListener('click', () => modal.remove());
}

// Show a friendly limit notice near the button that was blocked
function showLimitNotice(anchorEl, message) {
  const existing = document.getElementById('limit-notice');
  if (existing) existing.remove();
  const notice = document.createElement('div');
  notice.id = 'limit-notice';
  notice.textContent = message;
  const r = anchorEl.getBoundingClientRect();
  notice.style.position   = 'fixed';
  notice.style.top         = (r.bottom + 6) + 'px';
  notice.style.left        = r.left + 'px';
  notice.style.background  = '#1e293b';
  notice.style.color       = '#f1f5f9';
  notice.style.fontFamily  = 'Inter, sans-serif';
  notice.style.fontSize    = '11px';
  notice.style.fontWeight  = '500';
  notice.style.padding     = '6px 12px';
  notice.style.borderRadius = '6px';
  notice.style.boxShadow   = '0 4px 12px rgba(30,41,59,0.2)';
  notice.style.zIndex      = '9999';
  notice.style.pointerEvents = 'none';
  notice.style.whiteSpace  = 'nowrap';
  document.body.appendChild(notice);
  setTimeout(() => notice.remove(), 2800);
}

const state = {
  tool: 'select',      // select | draw | erase | text
  zoom: 1,
  strokeColor: '#1a1814',
  brushSize: 3,
  isDrawing: false,
  drawPoints: [],
  frameCount: 0,
  waveformCount: 0,
  labelCount: 0,
  imageCount: 0,
};

// Canvas transform
const container = document.getElementById('canvas-container');
const infiniteCanvas = document.getElementById('infinite-canvas');
const drawCanvas = document.getElementById('draw-canvas');
const ctx = drawCanvas.getContext('2d');
drawCanvas.width = 8000;
drawCanvas.height = 8000;

// ═══════════════════════════════════════════════════════════
// TRANSFORM
// ═══════════════════════════════════════════════════════════
// Transform cache — keeps drawing overlay coords in sync without layout reflow
let _tx = 0, _ty = 0, _tz = 1;

// Calculate the minimum zoom so the canvas always fills the viewport.
// Canvas is CANVAS_SIZE px; viewport excludes toolbar + statusbar.
function getMinZoom() {
  const vw = window.innerWidth;
  const vh = window.innerHeight - 86 - 26; // toolbar+tabbar + statusbar
  // Canvas must always be at least as large as the viewport so you
  // can't pan into blank space. Also enforce a 25% floor for usability.
  const fitZoom = Math.max(vw / CANVAS_SIZE, vh / CANVAS_SIZE);
  return Math.max(fitZoom, 0.25);
}

const scrollWrapper = document.getElementById('scroll-wrapper');

function applyTransform() {
  // Zoom scales the scroll-wrapper so scrollable area grows/shrinks with zoom
  scrollWrapper.style.transform = `scale(${state.zoom})`;
  scrollWrapper.style.width  = CANVAS_SIZE + 'px';
  scrollWrapper.style.height = CANVAS_SIZE + 'px';
  // Tell container how big the scaled content actually is
  // (browser needs explicit size for scrollbars to work correctly)
  const scaledSize = CANVAS_SIZE * state.zoom;
  scrollWrapper.style.marginRight  = Math.max(0, scaledSize - CANVAS_SIZE) + 'px';
  scrollWrapper.style.marginBottom = Math.max(0, scaledSize - CANVAS_SIZE) + 'px';

  const pct = Math.round(state.zoom * 100);
  const minPct = Math.round(getMinZoom() * 100);
  const zoomEl = document.getElementById('status-zoom');
  zoomEl.textContent = pct + '%';
  zoomEl.classList.toggle('at-min', pct <= minPct + 2);
  // Update transform cache for drawing coordinate conversion
  _tx = -container.scrollLeft / state.zoom;
  _ty = -container.scrollTop  / state.zoom;
  _tz = state.zoom;
}
applyTransform();

// Client coords → canvas coords (accounts for scroll position and zoom)
function toCanvas(cx, cy) {
  return {
    x: (cx + container.scrollLeft) / state.zoom,
    y: (cy - 52 + container.scrollTop) / state.zoom,
  };
}

// ═══════════════════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════════════════
const toolBtns = {
  select: document.getElementById('tool-select'),
  draw:   document.getElementById('tool-draw'),
  erase:  document.getElementById('tool-erase'),
  shape:  document.getElementById('tool-shape'),
  text:   document.getElementById('tool-text'),
};

let activeShape = 'rect'; // rect | circle | arrow

function setTool(t) {
  state.tool = t;
  Object.values(toolBtns).forEach(b => b.classList.remove('active'));
  toolBtns[t].classList.add('active');
  document.getElementById('status-tool').textContent = t.toUpperCase();
  const dc = document.getElementById('draw-canvas');
  dc.classList.toggle('drawing-mode', t === 'draw' || t === 'erase');
  // Show/hide shape sub-picker
  document.getElementById('shape-picker').classList.toggle('visible', t === 'shape');
  // Overlay is activated per-stroke via overlayActivate/Deactivate.
  // When switching tools, always make sure it's deactivated.
  if (typeof overlayDeactivate === 'function') overlayDeactivate();
  // Clear overlay when switching tools
  if (typeof octx !== 'undefined') {
    octx.clearRect(0, 0, overlay.width, overlay.height);
  }
  container.style.cursor = t === 'select' ? 'default' : t === 'text' ? 'text' : 'crosshair';
}

Object.entries(toolBtns).forEach(([t, btn]) => btn.addEventListener('click', () => setTool(t)));

document.getElementById('stroke-color').addEventListener('input', e => { state.strokeColor = e.target.value; });
document.getElementById('brush-size').addEventListener('input', e => {
  state.brushSize = +e.target.value;
  document.getElementById('brush-size-num').value = e.target.value;
});
document.getElementById('brush-size-num').addEventListener('input', e => {
  const v = Math.min(40, Math.max(1, parseInt(e.target.value) || 1));
  state.brushSize = v;
  document.getElementById('brush-size').value = v;
  e.target.value = v;
});
// Prevent keyboard shortcuts firing while typing in the number field
document.getElementById('brush-size-num').addEventListener('keydown', e => e.stopPropagation());

// Pressure sensitivity toggle
state.pressureEnabled = false;
document.getElementById('btn-pressure').addEventListener('click', () => {
  state.pressureEnabled = !state.pressureEnabled;
  document.getElementById('btn-pressure').classList.toggle('active', state.pressureEnabled);
});

// Fill colour and toggle
state.fillColor   = '#ffffff';
state.fillEnabled = false;
document.getElementById('fill-color').addEventListener('input', e => { state.fillColor = e.target.value; });
document.getElementById('fill-toggle').addEventListener('click', () => {
  state.fillEnabled = !state.fillEnabled;
  document.getElementById('fill-toggle').classList.toggle('active', state.fillEnabled);
});

// Shape sub-picker
['rect','circle','arrow'].forEach(s => {
  document.getElementById('shape-' + s).addEventListener('click', () => {
    activeShape = s;
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('shape-' + s).classList.add('active');
  });
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'v' || e.key === 'V') setTool('select');
  if (e.key === 'd' || e.key === 'D') setTool('draw');
  if (e.key === 'e' || e.key === 'E') setTool('erase');
  if (e.key === 's' || e.key === 'S') setTool('shape');
  if (e.key === 't' || e.key === 'T') setTool('text');
  if (e.key === 'f' || e.key === 'F') {
    if (liveFrameCount() >= 10) {
      showLimitNotice(document.getElementById('btn-add-frame'),
        `Free plan: max 10 frames. Upgrade to Pro for unlimited.`);
    } else { addFrame(); }
  }
  if (e.key === 'a' || e.key === 'A') document.getElementById('audio-input').click();
  if (e.key === 'i' || e.key === 'I') document.getElementById('image-input').click();
});

// ═══════════════════════════════════════════════════════════
// CANVAS PANNING (Middle Mouse)
// ═══════════════════════════════════════════════════════════
// Panning is now handled natively by the browser scrollbars.
// We just sync the transform cache whenever the container scrolls.
container.addEventListener('scroll', () => {
  _tx = -container.scrollLeft / state.zoom;
  _ty = -container.scrollTop  / state.zoom;
});

container.addEventListener('mousedown', e => {
  if (e.button === 0 && state.tool === 'text') {
    if (e.target.closest('#tab-bar')) return;
    const pos = toCanvas(e.clientX, e.clientY);
    addLabel(pos.x, pos.y);
    setTool('select');
  }
});

window.addEventListener('mousemove', e => {
  const pos = toCanvas(e.clientX, e.clientY);
  document.getElementById('status-pos').textContent = `${Math.round(pos.x)}, ${Math.round(pos.y)}`;
});

// Wheel handler — separates trackpad scroll from zoom gestures.
//
// Browser behaviour:
//   Trackpad two-finger scroll  → wheel event, ctrlKey=false, deltaX and/or deltaY set
//   Trackpad pinch-to-zoom      → wheel event, ctrlKey=true (synthetic), small deltaY
//   Mouse wheel scroll          → wheel event, ctrlKey=false, deltaX=0, deltaY set
//   Ctrl + mouse wheel          → wheel event, ctrlKey=true, larger deltaY
//
// Rule: only zoom when ctrlKey is true. Everything else is a scroll — let
// the browser handle it natively so two-finger trackpad pan works correctly.
container.addEventListener('wheel', e => {
  if (!e.ctrlKey) {
    // Trackpad two-finger pan — manually apply both axes simultaneously
    // to bypass the browser's built-in scroll axis locking behaviour.
    e.preventDefault();
    container.scrollLeft += e.deltaX;
    container.scrollTop  += e.deltaY;
    _tx = -container.scrollLeft / state.zoom;
    _ty = -container.scrollTop  / state.zoom;
    return;
  }

  // Zoom gesture — prevent browser's own pinch-zoom taking over
  e.preventDefault();

  // Use proportional delta for smooth trackpad pinch, capped for mouse wheel.
  // Trackpad sends many small events; mouse wheel sends fewer large ones.
  // Normalise so both feel responsive but not jumpy.
  const rawDelta = e.deltaY;
  let zoomFactor;
  if (e.deltaMode === 0) {
    // Pixel mode (trackpad) — deltaY is small, use proportional scaling
    zoomFactor = 1 - Math.min(Math.max(rawDelta * 0.005, -0.15), 0.15);
  } else {
    // Line/page mode (mouse wheel) — use fixed step
    zoomFactor = rawDelta > 0 ? 0.9 : 1.1;
  }

  const newZoom = Math.max(getMinZoom(), Math.min(4, state.zoom * zoomFactor));
  if (newZoom === state.zoom) return;

  // Keep the canvas point under the cursor stationary while zooming
  const mouseCanvasX = (e.clientX + container.scrollLeft) / state.zoom;
  const mouseCanvasY = (e.clientY - 52 + container.scrollTop) / state.zoom;
  state.zoom = newZoom;
  applyTransform();
  container.scrollLeft = mouseCanvasX * newZoom - e.clientX;
  container.scrollTop  = mouseCanvasY * newZoom - (e.clientY - 52);
  _tx = -container.scrollLeft / state.zoom;
  _ty = -container.scrollTop  / state.zoom;
}, { passive: false });

container.addEventListener('contextmenu', e => e.preventDefault());

// ═══════════════════════════════════════════════════════════
// FREEHAND DRAWING — overlay + stroke-history system
//
// Architecture:
//   overlay canvas  : screen-res, live stroke preview (fast, no offset issues)
//   drawCanvas      : 8000×8000, final raster of all committed strokes
//   strokeHistory[] : vector record of every stroke for move/undo support
//
// Coordinate spaces:
//   screen  : raw clientX/Y from pointer events (what the overlay uses)
//   canvas  : infinite-canvas space = (screen - pan) / zoom
//             This is what gets stored in strokeHistory and drawn to drawCanvas.
//
// The drop-on-commit bug was caused by the overlay being position:fixed
// starting at y=0 but the toolbar consuming 52px — so screen→canvas was
// offset by the toolbar height. Fix: use toCanvas() (pan/zoom math) for
// all canvas-space coordinates instead of getBoundingClientRect().
// ═══════════════════════════════════════════════════════════

const TOOLBAR_H = 86; // toolbar (52px) + tab bar (34px)

const overlay = document.getElementById('stroke-overlay');
const octx    = overlay.getContext('2d');

function resizeOverlay() {
  overlay.width  = window.innerWidth;
  overlay.height = window.innerHeight - 86 - 26;
}
resizeOverlay();
window.addEventListener('resize', () => {
  resizeOverlay();
  const minZ = getMinZoom();
  if (state.zoom < minZ) state.zoom = minZ;
  applyTransform();
});

// Sync cache helper (variables declared above near applyTransform)
function invalidateTransformCache() {
  _tx = -container.scrollLeft / state.zoom;
  _ty = -container.scrollTop  / state.zoom;
  _tz = state.zoom;
}
invalidateTransformCache();

// Screen coords → canvas coords  (uses cached pan/zoom — no reflow)
// clientY from the overlay (position:fixed, top:0) must subtract the
// canvas-container top offset (TOOLBAR_H) so Y lines up with canvas space.
function screenToCanvas(sx, sy) {
  return {
    x: (sx + container.scrollLeft) / state.zoom,
    y: (sy - TOOLBAR_H + container.scrollTop) / state.zoom,
  };
}

// Canvas coords → screen coords (inverse)
function canvasToScreen(cx, cy) {
  return {
    x: cx * state.zoom - container.scrollLeft,
    y: cy * state.zoom - container.scrollTop + TOOLBAR_H,
  };
}

// ── Stroke history ──────────────────────────────────────────
// Each entry: { points:[{x,y,w}…], color, isErase, offsetX, offsetY }
// offsetX/Y are applied at render time so we can move strokes cheaply.
let strokeHistory = [];
let undoStack = []; // stores removed strokes for undo (max 5)
const MAX_UNDO = 5;

function updateUndoButton() {
  const btn = document.getElementById('btn-undo');
  if (btn) btn.disabled = strokeHistory.length === 0;
}

function undoLast() {
  if (strokeHistory.length === 0) return;
  const removed = strokeHistory.pop();
  undoStack.push(removed);
  if (undoStack.length > MAX_UNDO) undoStack.shift(); // keep max 5
  redrawAllStrokes();
  updateUndoButton();
  touchAutoSave();
}

// Redraw all committed strokes onto drawCanvas from vector data
function redrawAllStrokes() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  for (const s of strokeHistory) {
    drawStrokeToCtx(ctx, s);
  }
}

function drawStrokeToCtx(targetCtx, s) {
  targetCtx.save();
  targetCtx.globalCompositeOperation = 'source-over';
  const ox = s.offsetX || 0, oy = s.offsetY || 0;

  if (s.type === 'rect' || s.type === 'circle' || s.type === 'arrow') {
    // ── Shape rendering ──
    const x1 = s.x1 + ox, y1 = s.y1 + oy;
    const x2 = s.x2 + ox, y2 = s.y2 + oy;
    targetCtx.strokeStyle = s.color;
    targetCtx.lineWidth   = s.strokeWidth || 2;
    targetCtx.lineCap     = 'round';
    targetCtx.lineJoin    = 'round';

    if (s.type === 'rect') {
      if (s.fillEnabled) {
        targetCtx.fillStyle = s.fillColor || '#ffffff';
        targetCtx.fillRect(x1, y1, x2 - x1, y2 - y1);
      }
      targetCtx.strokeRect(x1, y1, x2 - x1, y2 - y1);

    } else if (s.type === 'circle') {
      const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
      const rx = Math.abs(x2 - x1) / 2, ry = Math.abs(y2 - y1) / 2;
      targetCtx.beginPath();
      targetCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      if (s.fillEnabled) { targetCtx.fillStyle = s.fillColor || '#ffffff'; targetCtx.fill(); }
      targetCtx.stroke();

    } else if (s.type === 'arrow') {
      const dx = x2 - x1, dy = y2 - y1;
      const angle = Math.atan2(dy, dx);
      const len   = Math.sqrt(dx*dx + dy*dy);
      const headLen = Math.min(30, len * 0.35);
      // Shaft
      targetCtx.beginPath();
      targetCtx.moveTo(x1, y1);
      targetCtx.lineTo(x2, y2);
      targetCtx.stroke();
      // Arrowhead
      targetCtx.beginPath();
      targetCtx.moveTo(x2, y2);
      targetCtx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/6), y2 - headLen * Math.sin(angle - Math.PI/6));
      targetCtx.moveTo(x2, y2);
      targetCtx.lineTo(x2 - headLen * Math.cos(angle + Math.PI/6), y2 - headLen * Math.sin(angle + Math.PI/6));
      targetCtx.stroke();
    }

  } else {
    // ── Freehand stroke rendering ──
    if (s.points.length < 2) { targetCtx.restore(); return; }
    targetCtx.globalCompositeOperation = s.isErase ? 'destination-out' : 'source-over';
    targetCtx.lineCap  = 'round';
    targetCtx.lineJoin = 'round';
    targetCtx.strokeStyle = s.color;
    targetCtx.beginPath();
    targetCtx.moveTo(s.points[0].x + ox, s.points[0].y + oy);
    for (let i = 1; i < s.points.length; i++) {
      const pa = s.points[i-1], pb = s.points[i];
      const mx = (pa.x + pb.x) / 2 + ox, my = (pa.y + pb.y) / 2 + oy;
      targetCtx.lineWidth = pb.w;
      targetCtx.quadraticCurveTo(pa.x + ox, pa.y + oy, mx, my);
    }
    targetCtx.lineTo(s.points[s.points.length-1].x + ox, s.points[s.points.length-1].y + oy);
    targetCtx.stroke();
  }

  targetCtx.restore();
}

// ── Live drawing directly onto drawCanvas in canvas-space ──────
// Drawing in canvas-space (not screen-space) means strokes are never
// clipped at screen edges, regardless of zoom level or pan position.

// ── Drawing engine ───────────────────────────────────────────
// Live strokes render on the screen-res overlay (smooth, no flicker).
// On commit the stroke is converted to canvas-space, added to history,
// and drawn onto drawCanvas. The overlay is then cleared.
//
// activePoints: screen-space { sx, sy, w, color } collected during stroke.
let activePoints = [];
let activeIsErase = false;

// Render the complete in-progress stroke onto the overlay each frame.
// Repainting the whole path (not just the latest segment) gives smooth curves
// because quadratic Bézier needs all prior points to look right.
function renderOverlayStroke() {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  if (activePoints.length < 1) return;
  // Single point — render as a dot
  if (activePoints.length === 1) {
    const c = screenToCanvas(activePoints[0].sx, activePoints[0].sy);
    const sx = c.x * state.zoom - container.scrollLeft;
    const sy = c.y * state.zoom - container.scrollTop;
    octx.beginPath();
    octx.arc(sx, sy, activePoints[0].w / 2, 0, Math.PI * 2);
    octx.fillStyle = activePoints[0].color;
    octx.fill();
    return;
  }

  // Convert each screen point → canvas space → back to overlay screen space.
  // This uses the exact same math as screenToCanvas + canvasToScreen so the
  // preview aligns pixel-perfectly with the committed stroke on drawCanvas.
  // canvasToScreen: x = cx * zoom - scrollLeft,  y = cy * zoom - scrollTop + TOOLBAR_H
  const pts = activePoints.map(p => {
    const c = screenToCanvas(p.sx, p.sy); // canvas space
    return {
      ox: c.x * state.zoom - container.scrollLeft,
      oy: c.y * state.zoom - container.scrollTop,  // overlay top = TOOLBAR_H, already excluded
      w:  p.w,
      color: p.color,
    };
  });

  octx.save();
  octx.lineCap  = 'round';
  octx.lineJoin = 'round';
  octx.beginPath();
  octx.moveTo(pts[0].ox, pts[0].oy);
  for (let i = 1; i < pts.length; i++) {
    const pa = pts[i - 1], pb = pts[i];
    const mx = (pa.ox + pb.ox) / 2;
    const my = (pa.oy + pb.oy) / 2;
    octx.lineWidth   = pb.w;
    octx.strokeStyle = pb.color;
    octx.quadraticCurveTo(pa.ox, pa.oy, mx, my);
  }
  const last = pts[pts.length - 1];
  octx.lineTo(last.ox, last.oy);
  octx.lineWidth   = last.w;
  octx.strokeStyle = last.color;
  octx.stroke();
  octx.restore();
}

let rafPending = false;
function scheduleOverlayRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; renderOverlayStroke(); });
}

// Commit: convert screen-space points → canvas-space, store in history,
// paint onto drawCanvas incrementally (no full redraw needed), clear overlay.
function commitStroke(isErase) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  // Freeze snapshot disabled for testing — always use activePoints directly
  const pts = activePoints;

  if (pts.length < 1) { activePoints = []; frozenPoints = null; return; }

  // Single point — duplicate it so the quadratic curve renderer draws a dot
  if (pts.length === 1) {
    pts.push({ ...pts[0], sx: pts[0].sx + 0.1, sy: pts[0].sy + 0.1 });
  }
  const canvasPoints = pts.map(p => {
    const c = screenToCanvas(p.sx, p.sy);
    return { x: c.x, y: c.y, w: p.w / _tz };
  });
  const stroke = { points: canvasPoints, color: activePoints[0].color, isErase, offsetX: 0, offsetY: 0 };
  strokeHistory.push(stroke);
  undoStack = []; // new stroke clears redo history
  if (isErase) {
    redrawAllStrokes();
  } else {
    drawStrokeToCtx(ctx, stroke);
  }
  updateUndoButton();
  activePoints = [];
  frozenPoints  = null;
  touchAutoSave();
}

// ── Overlay activate / deactivate ────────────────────────────
// Overlay is only hot (pointer-events:all, high z-index) during an active stroke.
// Between strokes it's invisible to clicks so frames remain accessible.
function overlayActivate() {
  overlay.style.pointerEvents = 'all';
  overlay.style.cursor = 'crosshair';
  overlay.style.zIndex = '999';
}
function overlayDeactivate() {
  overlay.style.pointerEvents = 'none';
  overlay.style.cursor = '';
  overlay.style.zIndex = '6';
}

// ── Shape drawing state ──────────────────────────────────────
let shapeStart = null; // { sx, sy } screen coords where drag started

function renderShapePreview(sx1, sy1, sx2, sy2) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  const oy = TOOLBAR_H;
  octx.save();
  octx.strokeStyle = state.strokeColor;
  octx.lineWidth   = state.brushSize * 2;
  octx.lineCap     = 'round';
  octx.lineJoin    = 'round';
  octx.setLineDash([6, 4]);
  const x1 = sx1, y1 = sy1 - oy, x2 = sx2, y2 = sy2 - oy;

  if (activeShape === 'rect') {
    if (state.fillEnabled) {
      octx.fillStyle = state.fillColor + '88'; // semi-transparent preview
      octx.fillRect(x1, y1, x2-x1, y2-y1);
    }
    octx.strokeRect(x1, y1, x2-x1, y2-y1);

  } else if (activeShape === 'circle') {
    const cx = (x1+x2)/2, cy = (y1+y2)/2;
    const rx = Math.abs(x2-x1)/2, ry = Math.abs(y2-y1)/2;
    octx.beginPath();
    octx.ellipse(cx, cy, Math.max(1,rx), Math.max(1,ry), 0, 0, Math.PI*2);
    if (state.fillEnabled) { octx.fillStyle = state.fillColor + '88'; octx.fill(); }
    octx.stroke();

  } else if (activeShape === 'arrow') {
    const dx = x2-x1, dy = y2-y1;
    const angle = Math.atan2(dy, dx);
    const len = Math.sqrt(dx*dx+dy*dy);
    const headLen = Math.min(30, len*0.35);
    octx.beginPath();
    octx.moveTo(x1, y1); octx.lineTo(x2, y2); octx.stroke();
    octx.setLineDash([]);
    octx.beginPath();
    octx.moveTo(x2, y2);
    octx.lineTo(x2 - headLen*Math.cos(angle-Math.PI/6), y2 - headLen*Math.sin(angle-Math.PI/6));
    octx.moveTo(x2, y2);
    octx.lineTo(x2 - headLen*Math.cos(angle+Math.PI/6), y2 - headLen*Math.sin(angle+Math.PI/6));
    octx.stroke();
  }
  octx.restore();
}

function commitShape(sx1, sy1, sx2, sy2) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  const c1 = screenToCanvas(sx1, sy1);
  const c2 = screenToCanvas(sx2, sy2);
  const shape = {
    type: activeShape,
    x1: c1.x, y1: c1.y, x2: c2.x, y2: c2.y,
    color: state.strokeColor,
    fillColor: state.fillColor,
    fillEnabled: state.fillEnabled,
    strokeWidth: Math.max(1, state.brushSize * 2 / state.zoom),
    offsetX: 0, offsetY: 0,
    points: [{ x: c1.x, y: c1.y, w: 1 }, { x: c2.x, y: c2.y, w: 1 }], // for hit-test bbox
  };
  strokeHistory.push(shape);
  undoStack = []; // new shape clears redo history
  drawStrokeToCtx(ctx, shape);
  updateUndoButton();
}

// ── Pointer events ───────────────────────────────────────────
// ── Pen input helpers ────────────────────────────────────────
// Calculate point width from pressure
function pointWidth(e, isErase) {
  // Use pressure > 0.01 to avoid the near-zero values some tablets report
  // on initial contact before pressure fully registers
  // Use a very low threshold — quick taps often have lower initial pressure
  const pressure = (state.pressureEnabled && e.pressure > 0.005) ? e.pressure : 0.5;
  return isErase
    ? state.brushSize * 6
    : Math.max(1, state.brushSize * (state.pressureEnabled ? pressure * 2 : 1));
}

let frozenPoints = null; // snapshot of activePoints at last known pen-down frame

function startStroke(e, isErase) {
  activeIsErase = isErase;
  overlayActivate();
  state.isDrawing = true;
  activePoints = [];
  frozenPoints  = null;
  const pt = {
    sx: e.clientX, sy: e.clientY,
    w: pointWidth(e, isErase),
    color: state.strokeColor,
    pointerType: e.pointerType,
  };
  activePoints.push(pt);
  // Immediately freeze the first point — guarantees taps commit even with no move events
  frozenPoints = activePoints.slice();
}

// ── Primary stroke start — pointerdown on window (capture phase) ──
window.addEventListener('pointerdown', e => {
  if (state.tool !== 'draw' && state.tool !== 'erase' && state.tool !== 'shape') return;
  if (e.button === 1) return;
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  // Use elementFromPoint with overlay temporarily transparent to find
  // what's physically under the pen — the overlay sits on top and
  // would return itself if left active during the check.
  const _prevPE = overlay.style.pointerEvents;
  overlay.style.pointerEvents = 'none';
  const underPen = document.elementFromPoint(e.clientX, e.clientY);
  overlay.style.pointerEvents = _prevPE;
  if (underPen && underPen.closest('.sb-frame, .waveform-block, .canvas-image, .canvas-label, #toolbar, #tab-bar')) return;

  e.preventDefault();

  if (state.tool === 'shape') {
    overlayActivate();
    overlay.setPointerCapture(e.pointerId);
    state.isDrawing = true;
    shapeStart = { sx: e.clientX, sy: e.clientY };
    return;
  }

  startStroke(e, state.tool === 'erase');
  // Capture on the overlay so pointermove keeps firing even if pen moves fast
  try { overlay.setPointerCapture(e.pointerId); } catch(_) {}
}, { capture: true });

// ── Fallback: catch pen strokes that pointerdown missed ──────
// If the pen is already moving when it touches (common with fast gestures),
// pointerdown may fire with buttons=0 and be skipped. pointermove on the
// window in capture phase catches these orphaned move events.
window.addEventListener('pointermove', e => {
  if (state.tool !== 'draw' && state.tool !== 'erase') return;
  if (e.pointerType !== 'pen') return; // only needed for pen
  if (state.isDrawing) return;         // already drawing normally
  // pen is down (buttons & 1) but we missed the pointerdown
  if (!(e.buttons & 1)) return;
  const underPen2 = document.elementFromPoint(e.clientX, e.clientY);
  if (underPen2 && underPen2.closest('.sb-frame, .waveform-block, .canvas-image, .canvas-label, #toolbar, #tab-bar')) return;
  // Start the stroke now from this move event
  startStroke(e, state.tool === 'erase');
  try { overlay.setPointerCapture(e.pointerId); } catch(_) {}
}, { capture: true, passive: false });

overlay.addEventListener('pointermove', e => {
  if (!state.isDrawing) return;
  e.preventDefault();
  if (state.tool === 'shape' && shapeStart) {
    renderShapePreview(shapeStart.sx, shapeStart.sy, e.clientX, e.clientY);
    return;
  }
  // For pen: stop collecting points the moment the pen lifts (buttons===0).
  // Do NOT call finishStroke here — let pointerup handle the commit so we
  // don't double-commit or commit with the wrong final coordinate.
  if (e.pointerType === 'pen' && e.buttons === 0) {
    return;
  }
  // Use coalesced events for maximum fidelity
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of events) {
    if (ev.pointerType === 'pen' && ev.buttons === 0) break;
    activePoints.push({
      sx: ev.clientX, sy: ev.clientY,
      w: pointWidth(ev, activeIsErase),
      color: state.strokeColor,
      pointerType: ev.pointerType,
    });
  }
  // Freeze a snapshot of activePoints while pen is confirmed down.
  // commitStroke will use this snapshot, ignoring any points added
  // after the pen physically leaves the surface.
  if (e.pointerType !== 'pen' || e.buttons > 0) {
    frozenPoints = activePoints.slice();
  }
  scheduleOverlayRender();
}, { passive: false });

function finishStroke(e) {
  if (!state.isDrawing) return;
  state.isDrawing = false;
  if (state.tool === 'shape' && shapeStart) {
    commitShape(shapeStart.sx, shapeStart.sy, e.clientX, e.clientY);
    shapeStart = null;
    overlayDeactivate();
    return;
  }
  commitStroke(activeIsErase);
  overlayDeactivate();
}

// Single pointerup handler on window — catches all cases including
// when pointer capture is lost. Guard with isDrawing prevents double-commit.
window.addEventListener('pointerup', e => {
  if (state.isDrawing) finishStroke(e);
}, { capture: true });

window.addEventListener('pointercancel', e => {
  if (state.isDrawing) finishStroke(e);
}, { capture: true });

// Strokes and shapes are permanent once drawn — select mode only applies
// to DOM elements (frames, images, labels). No stroke drag/selection needed.

document.getElementById('btn-clear-draw').addEventListener('click', () => {
  strokeHistory = [];
  undoStack = [];
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  octx.clearRect(0, 0, overlay.width, overlay.height);
  updateUndoButton();
  touchAutoSave();
});

document.getElementById('btn-undo').addEventListener('click', undoLast);

// Ctrl+Z keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      undoLast();
    }
  }
});

// ═══════════════════════════════════════════════════════════
// DRAGGING UTILITY
// ═══════════════════════════════════════════════════════════
function makeDraggable(el, handleEl, onDrag) {
  let startX, startY, startL, startT, dragging = false;
  handleEl.addEventListener('pointerdown', e => {
    // Accept left mouse button or any pen/touch contact
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    // Respect pinned state
    if (el.dataset.pinned === 'true') return;
    // Don't block clicks on buttons or inputs inside the handle
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    e.stopPropagation(); e.preventDefault();
    handleEl.setPointerCapture(e.pointerId);
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startL = parseInt(el.style.left) || 0;
    startT = parseInt(el.style.top) || 0;
    const onMove = ev => {
      if (!dragging) return;
      const dx = (ev.clientX - startX) / state.zoom;
      const dy = (ev.clientY - startY) / state.zoom;
      el.style.left = (startL + dx) + 'px';
      el.style.top  = (startT + dy) + 'px';
      if (onDrag) onDrag();
    };
    const onUp = () => {
      dragging = false;
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
}

// Toggle pin on any pinnable element
function makePinnable(el, pinBtn) {
  // Store the element's natural z-index so we can restore it on unpin
  function getNaturalZ() {
    if (el.classList.contains('waveform-block')) return 50;
    if (el.classList.contains('sb-frame'))       return 40;
    if (el.classList.contains('canvas-label'))   return 35;
    if (el.classList.contains('canvas-image'))   return 30;
    return 40;
  }

  function updatePinVisual(isPinned) {
    pinBtn.classList.toggle('pinned', isPinned);
    pinBtn.title = isPinned ? 'Unpin (unlock position)' : 'Pin (lock position)';
    el.classList.toggle('pinned-element', isPinned);
    pinBtn.textContent = isPinned ? '⊗' : '⊙';

    if (el.classList.contains('waveform-block')) {
      el.dataset.pinned = isPinned ? 'true' : 'false';
      if (isPinned) {
        // Waveform body drops below ink (z-index 5) so drawing works on top.
        // But the header stays above the draw canvas so hover events reach it,
        // allowing the pen-disable-on-hover to work while pinned.
        el.style.zIndex = '3';
        const hdr = el.querySelector('.waveform-header');
        if (hdr) hdr.style.zIndex = '10';
        if (hdr) hdr.style.position = 'relative';
      } else {
        el.style.zIndex = getNaturalZ();
        const hdr = el.querySelector('.waveform-header');
        if (hdr) { hdr.style.zIndex = ''; hdr.style.position = ''; }
      }
    } else {
      el.style.zIndex = isPinned ? '3' : getNaturalZ();
    }

    // Update drag handle cursor when pinned
    const dh = el.querySelector('.canvas-label-drag');
    if (dh) dh.style.cursor = isPinned ? 'default' : 'move';
  }

  pinBtn.addEventListener('click', e => {
    e.stopPropagation();
    const pinned = el.dataset.pinned === 'true';
    el.dataset.pinned = pinned ? 'false' : 'true';
    updatePinVisual(!pinned);
  });
}

function makeResizable(el, onResize) {
  const handle = el.querySelector('.sb-resize');
  if (!handle) return;
  handle.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const startW = el.offsetWidth, startH = el.offsetHeight;
    const onMove = ev => {
      const dw = (ev.clientX - startX) / state.zoom;
      const dh = (ev.clientY - startY) / state.zoom;
      el.style.width  = Math.max(160, startW + dw) + 'px';
      el.style.height = Math.max(120, startH + dh) + 'px';
      if (onResize) onResize();
    };
    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

// ═══════════════════════════════════════════════════════════
// STORYBOARD FRAMES
// ═══════════════════════════════════════════════════════════
function addFrame(opts) {
  state.frameCount++;
  const id = 'frame-' + Date.now();
  // Default placement: near the current viewport centre in canvas space,
  // with a small random offset so multiple frames don't stack exactly.
  const viewCX = (container.scrollLeft + window.innerWidth  / 2) / state.zoom;
  const viewCY = (container.scrollTop  + (window.innerHeight - TOOLBAR_H - 26) / 2) / state.zoom;
  const x = opts?.x ?? (viewCX - 140 + (Math.random() * 80 - 40));
  const y = opts?.y ?? (viewCY - 100 + (Math.random() * 80 - 40));
  const w = opts?.w ?? 280;
  const h = opts?.h ?? 200;
  const title = opts?.title ?? `Frame ${state.frameCount}`;
  const activeTab = opts?.activeTab ?? 'draw';
  const textContent = opts?.textContent ?? '';
  const imgSrc = opts?.imgSrc ?? null;

  const frame = document.createElement('div');
  frame.className = 'sb-frame';
  frame.id = id;
  frame.style.left = x + 'px';
  frame.style.top  = y + 'px';
  frame.style.width  = w + 'px';
  frame.style.height = h + 'px';

  frame.innerHTML = `
    <div class="sb-frame-header">
      <input class="sb-frame-title" value="${title}" placeholder="Label…" readonly title="Double-click to rename">
      <button class="sb-frame-btn pin" title="Pin (lock position)">⊙</button>
      <button class="sb-frame-btn del" title="Delete">✕</button>
    </div>
    <div class="sb-frame-body">
      <div class="sb-frame-tabs">
        <button class="sb-tab ${activeTab==='draw'?'active':''}" data-tab="draw">DRAW</button>
        <button class="sb-tab ${activeTab==='text'?'active':''}" data-tab="text">TEXT</button>
        <button class="sb-tab ${activeTab==='image'?'active':''}" data-tab="image">MEDIA</button>
      </div>
      <div class="sb-frame-content">
        <div class="sb-pane" data-pane="draw" style="display:${activeTab==='draw'?'block':'none'};width:100%;height:100%;position:absolute;">
          <canvas class="sb-draw-canvas"></canvas>
        </div>
        <div class="sb-pane" data-pane="text" style="display:${activeTab==='text'?'flex':'none'};width:100%;height:100%;position:absolute;flex-direction:column;">
          <div class="sb-text-format-bar">
            <select class="tfp-select sb-tfp-font" style="width:100px;">
              <option value="Inter, sans-serif">Inter</option>
              <option value="'Plus Jakarta Sans', sans-serif">Plus Jakarta</option>
              <option value="Georgia, serif">Georgia</option>
              <option value="'Times New Roman', serif">Times New Roman</option>
              <option value="'Courier New', monospace">Courier New</option>
              <option value="Arial, sans-serif">Arial</option>
              <option value="Verdana, sans-serif">Verdana</option>
              <option value="Impact, sans-serif">Impact</option>
            </select>
            <select class="tfp-select sb-tfp-size" style="width:52px;">
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12" selected>12</option>
              <option value="14">14</option>
              <option value="16">16</option>
              <option value="18">18</option>
              <option value="20">20</option>
              <option value="24">24</option>
              <option value="28">28</option>
              <option value="32">32</option>
              <option value="36">36</option>
              <option value="48">48</option>
            </select>
            <input type="color" class="tfp-color sb-tfp-color" value="#1e293b" title="Text colour">
          </div>
          <textarea class="sb-text-area" placeholder="Notes, descriptions, directions…">${textContent}</textarea>
        </div>
        <div class="sb-pane" data-pane="image" style="display:${activeTab==='image'?'flex':'none'};width:100%;height:100%;position:absolute;">
          <div class="sb-image-area" id="media-area-${id}">
          </div>
        </div>
      </div>
    </div>
    <div class="sb-resize"></div>
  `;

  infiniteCanvas.appendChild(frame);

  // Tabs
  frame.querySelectorAll('.sb-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      frame.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      frame.querySelectorAll('.sb-pane').forEach(p => p.style.display = 'none');
      const pane = frame.querySelector(`[data-pane="${tab.dataset.tab}"]`);
      pane.style.display = tab.dataset.tab === 'text' ? 'flex' : 'block';
      if (tab.dataset.tab === 'draw') resizeSbCanvas(frame);
    });
  });

  // Frame text formatting bar
  const ta = frame.querySelector('.sb-text-area');
  const fmtBar = frame.querySelector('.sb-text-format-bar');
  const fmtFont  = frame.querySelector('.sb-tfp-font');
  const fmtSize  = frame.querySelector('.sb-tfp-size');
  const fmtColor = frame.querySelector('.sb-tfp-color');

  function applyFrameTextFormat() {
    ta.style.fontFamily = fmtFont.value;
    ta.style.fontSize   = fmtSize.value + 'px';
    ta.style.color      = fmtColor.value;
  }

  ta.addEventListener('focus', () => fmtBar.classList.add('visible'));
  // Show format bar on click — avoids blur/focus race conditions
  ta.addEventListener('click', () => fmtBar.classList.add('visible'));
  fmtFont.addEventListener('change', applyFrameTextFormat);
  fmtSize.addEventListener('change', applyFrameTextFormat);
  fmtColor.addEventListener('input',  applyFrameTextFormat);

  // Delete
  frame.querySelector('.sb-frame-btn.del').addEventListener('click', () => frame.remove());

  // Pin
  makePinnable(frame, frame.querySelector('.sb-frame-btn.pin'));

  // Right-click on header → edit title
  const titleInput = frame.querySelector('.sb-frame-title');

  function activateTitle(e) {
    if (e) e.preventDefault();
    titleInput.removeAttribute('readonly');
    titleInput.classList.add('editing');
    titleInput.focus();
    titleInput.select();
  }

  // Double-click OR right-click on the header to rename
  frame.querySelector('.sb-frame-header').addEventListener('dblclick', activateTitle);
  frame.querySelector('.sb-frame-header').addEventListener('contextmenu', activateTitle);
  // Single click directly on the title text when already editing
  titleInput.addEventListener('click', e => { if (!titleInput.readOnly) e.stopPropagation(); });

  titleInput.addEventListener('blur', () => {
    titleInput.setAttribute('readonly', '');
    titleInput.classList.remove('editing');
  });
  titleInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { titleInput.blur(); }
    e.stopPropagation(); // prevent keyboard shortcuts firing while typing
  });

  // Media chooser inside frame
  const mediaArea = frame.querySelector(`#media-area-${id}`);

  function showChooser() {
    mediaArea.innerHTML = `<div class="sb-media-chooser">
      <div class="sb-img-placeholder">&#127916; No media</div>
      <button class="sb-img-upload" data-action="image">&#128444; Image</button>
      <button class="sb-img-upload" data-action="video">&#127916; Video file</button>
      <button class="sb-img-upload" data-action="youtube">&#9654; YouTube link</button>
    </div>`;
    attachMediaChooser();
  }

  function setMediaContent(html) {
    // Wrap media in a container so the swap button can sit on top
    mediaArea.innerHTML = `<div class="sb-media-wrap">
      ${html}
      <button class="sb-media-swap" title="Change media">&#8635; swap</button>
    </div>`;
    // Swap button returns to chooser
    mediaArea.querySelector('.sb-media-swap').addEventListener('click', e => {
      e.stopPropagation();
      showChooser();
    });
  }

  function attachMediaChooser() {
    mediaArea.querySelectorAll('.sb-img-upload').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const action = btn.dataset.action;
        if (action === 'image') {
          const inp = document.createElement('input');
          inp.type = 'file'; inp.accept = 'image/*,.tiff,.tif';
          inp.onchange = () => {
            const file = inp.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => setMediaContent(`<img src="${ev.target.result}" alt="" style="max-width:100%;max-height:100%;object-fit:contain;">`);
            reader.readAsDataURL(file);
          };
          inp.click();
        } else if (action === 'video') {
          const inp = document.createElement('input');
          inp.type = 'file'; inp.accept = 'video/mp4,video/webm,video/quicktime,.mp4,.webm,.mov';
          inp.onchange = () => {
            const file = inp.files[0]; if (!file) return;
            const url = URL.createObjectURL(file);
            setMediaContent(`<video class="sb-media-video" src="${url}" controls style="max-width:100%;max-height:100%;"></video>`);
          };
          inp.click();
        } else if (action === 'youtube') {
          const raw = prompt('Paste a YouTube URL or video ID:');
          if (!raw) return;
          // Extract video ID from various YouTube URL formats
          let vid = raw.trim();
          const m = vid.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
          if (m) vid = m[1];
          if (vid.length !== 11) { alert('Could not find a valid YouTube video ID in that URL.'); return; }
          setMediaContent(`<iframe class="sb-media-iframe" src="https://www.youtube.com/embed/${vid}?rel=0" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" style="width:100%;height:100%;min-height:160px;border:none;"></iframe>`);
        }
      });
    });
  }

  // Initialise media pane — restore saved media or show chooser
  if (opts && opts.imgSrc) {
    const src = opts.imgSrc;
    if (src.startsWith('yt:')) {
      setMediaContent(`<iframe class="sb-media-iframe" src="https://www.youtube.com/embed/${src.slice(3)}?rel=0" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" style="width:100%;height:100%;min-height:160px;border:none;"></iframe>`);
    } else if (src.startsWith('data:video') || src.match(/\.(mp4|webm|mov)/i)) {
      setMediaContent(`<video class="sb-media-video" src="${src}" controls style="max-width:100%;max-height:100%;"></video>`);
    } else {
      setMediaContent(`<img src="${src}" alt="" style="max-width:100%;max-height:100%;object-fit:contain;">`);
    }
  } else {
    showChooser();
  }

  // Drawing inside frame
  setupFrameDrawing(frame);

  // Drag & resize
  const header = frame.querySelector('.sb-frame-header');
  makeDraggable(frame, header);
  makeResizable(frame, () => resizeSbCanvas(frame));

  resizeSbCanvas(frame);

  // Bring to front on click
  frame.addEventListener('mousedown', () => {
    document.querySelectorAll('.sb-frame').forEach(f => f.style.zIndex = 40);
    frame.style.zIndex = 45;
  });

  return frame;
}

function resizeSbCanvas(frame) {
  const c = frame.querySelector('.sb-draw-canvas');
  if (!c) return;
  const pane = frame.querySelector('[data-pane="draw"]');
  if (!pane) return;
  const pw = pane.offsetWidth, ph = pane.offsetHeight;
  if (pw < 10 || ph < 10) return;
  // Preserve drawing
  const tmp = document.createElement('canvas');
  tmp.width = c.width; tmp.height = c.height;
  tmp.getContext('2d').drawImage(c, 0, 0);
  c.width = pw; c.height = ph;
  c.getContext('2d').drawImage(tmp, 0, 0);
}

function setupFrameDrawing(frame) {
  const c = frame.querySelector('.sb-draw-canvas');
  const fctx = c.getContext('2d');
  let drawing = false;

  c.addEventListener('pointerdown', e => {
    e.stopPropagation();
    if (state.tool === 'select') return; // allow only when not in select mode... actually frame draw is independent
    drawing = true;
    c.setPointerCapture(e.pointerId);
    const r = c.getBoundingClientRect();
    fctx.beginPath();
    fctx.moveTo((e.clientX - r.left), (e.clientY - r.top));
    fctx.strokeStyle = state.strokeColor;
    fctx.lineWidth = Math.max(1, state.brushSize * (e.pressure > 0 ? e.pressure * 2 : 1));
    fctx.lineCap = 'round'; fctx.lineJoin = 'round';
  });

  c.addEventListener('pointermove', e => {
    if (!drawing) return;
    const r = c.getBoundingClientRect();
    const pressure = e.pressure > 0 ? e.pressure : 0.5;
    fctx.lineWidth = Math.max(1, state.brushSize * pressure * 2);
    fctx.strokeStyle = state.strokeColor;
    fctx.lineTo((e.clientX - r.left), (e.clientY - r.top));
    fctx.stroke();
    fctx.beginPath();
    fctx.moveTo((e.clientX - r.left), (e.clientY - r.top));
  });

  c.addEventListener('pointerup', () => drawing = false);
  c.addEventListener('pointercancel', () => drawing = false);
}

document.getElementById('btn-add-frame').addEventListener('click', e => {
  if (liveFrameCount() >= 10) {
    showLimitNotice(e.currentTarget,
      `Free plan: max 10 frames. Upgrade to Pro for unlimited.`);
    return;
  }
  addFrame();
  checkEasterEgg();
  touchAutoSave();
});

// ═══════════════════════════════════════════════════════════
// TEXT LABELS
// ═══════════════════════════════════════════════════════════
function addLabel(x, y, text, opts) {
  state.labelCount++;
  const el = document.createElement('div');
  el.className = 'canvas-label';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';

  // ── Header bar (drag handle + pin + delete) ──
  const header = document.createElement('div');
  header.className = 'canvas-label-header';

  const dragHandle = document.createElement('div');
  dragHandle.className = 'canvas-label-drag';
  dragHandle.title = 'Drag to move';

  const pin = document.createElement('button');
  pin.className = 'lbl-pin'; pin.textContent = '⊙';
  pin.title = 'Pin (lock position)';

  const del = document.createElement('button');
  del.className = 'lbl-del'; del.textContent = '✕';
  del.addEventListener('click', () => el.remove());

  header.appendChild(dragHandle);
  header.appendChild(pin);
  header.appendChild(del);

  // ── Text input ──
  const input = document.createElement('input');
  input.className = 'canvas-label-input';
  input.value = text || '';
  input.placeholder = 'Type here…';
  input.style.width = '200px';

  // Apply saved font settings if provided
  if (opts?.font)  input.style.fontFamily = opts.font;
  if (opts?.size)  input.style.fontSize   = opts.size + 'px';
  if (opts?.color) input.style.color      = opts.color;

  input.addEventListener('mousedown', e => e.stopPropagation());
  input.addEventListener('click', () => {
    el.classList.add('active');
    showTextFormatPopup(input, el);
  });

  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'sb-resize';

  el.appendChild(header);
  el.appendChild(input);
  el.appendChild(resizeHandle);
  infiniteCanvas.appendChild(el);

  // Drag by header handle only
  makeDraggable(el, dragHandle);

  // Pin
  makePinnable(el, pin);

  // Resize — drag bottom-right corner
  resizeHandle.addEventListener('mousedown', e => {
    if (el.dataset.pinned === 'true') return;
    e.stopPropagation(); e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const startW = el.offsetWidth, startH = el.offsetHeight;
    const onMove = ev => {
      const dw = (ev.clientX - startX) / state.zoom;
      const dh = (ev.clientY - startY) / state.zoom;
      el.style.width  = Math.max(120, startW + dw) + 'px';
      el.style.height = Math.max(48,  startH + dh) + 'px';
      input.style.width = '100%';
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  setTimeout(() => input.focus(), 50);
  return el;
}

// ═══════════════════════════════════════════════════════════
// CANVAS IMAGES
// ═══════════════════════════════════════════════════════════
function addCanvasImage(src, x, y) {
  const el = document.createElement('div');
  el.className = 'canvas-image';
  el.style.left = (x ?? 400) + 'px';
  el.style.top  = (y ?? 300) + 'px';

  const img = document.createElement('img');
  img.src = src;
  img.draggable = false;

  const del = document.createElement('button');
  del.className = 'img-del'; del.textContent = '✕';
  del.addEventListener('click', () => el.remove());

  // Resize handle
  const resizeH = document.createElement('div');
  resizeH.className = 'sb-resize';
  resizeH.style.position = 'absolute';

  const pin = document.createElement('button');
  pin.className = 'pin-btn'; pin.textContent = '⊙';
  pin.title = 'Pin (lock position)';

  el.appendChild(img);
  el.appendChild(del);
  el.appendChild(pin);
  el.appendChild(resizeH);
  infiniteCanvas.appendChild(el);
  makeDraggable(el, el);
  makePinnable(el, pin);

  // Resize image
  resizeH.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    const sx = e.clientX, sy = e.clientY;
    const sw = img.offsetWidth || 200, sh = img.offsetHeight || 200;
    const onMove = ev => {
      img.style.maxWidth = 'none';
      img.style.width  = Math.max(60, sw + (ev.clientX - sx) / state.zoom) + 'px';
      img.style.height = Math.max(60, sh + (ev.clientY - sy) / state.zoom) + 'px';
    };
    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  return el;
}

document.getElementById('btn-add-image').addEventListener('click', () => document.getElementById('image-input').click());
document.getElementById('image-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const pos = toCanvas(window.innerWidth / 2, window.innerHeight / 2);
    addCanvasImage(ev.target.result, pos.x - 150, pos.y - 100);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// ═══════════════════════════════════════════════════════════
// TEXT FORMAT POPUP
// ═══════════════════════════════════════════════════════════
const tfPopup   = document.getElementById('text-format-popup');
const tfFont    = document.getElementById('tfp-font');
const tfSize    = document.getElementById('tfp-size');
const tfColor   = document.getElementById('tfp-color');
let   tfTarget  = null; // the input/textarea currently being formatted

function showTextFormatPopup(inputEl, containerEl) {
  tfTarget = inputEl;

  // Sync controls to current input styles
  const cs = window.getComputedStyle(inputEl);
  const curFont  = inputEl.style.fontFamily || cs.fontFamily;
  const curSize  = parseInt(inputEl.style.fontSize || cs.fontSize) || 14;
  const curColor = inputEl.style.color || cs.color;

  // Match font select
  for (const opt of tfFont.options) {
    const optBase = opt.value.replace(/['\'"]/g, '').split(',')[0].trim().toLowerCase();
    if (curFont.toLowerCase().includes(optBase)) {
      tfFont.value = opt.value; break;
    }
  }
  // Match size select (find closest)
  let closest = '14';
  let minDiff = Infinity;
  for (const opt of tfSize.options) {
    const diff = Math.abs(parseInt(opt.value) - curSize);
    if (diff < minDiff) { minDiff = diff; closest = opt.value; }
  }
  tfSize.value = closest;

  // Convert computed rgb colour to hex for the colour picker
  try {
    const rgb = curColor.match(/\d+/g);
    if (rgb) {
      const hex = '#' + rgb.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
      tfColor.value = hex;
    }
  } catch(e) {}

  // Position popup above the container element
  const r = containerEl.getBoundingClientRect();
  tfPopup.style.left = r.left + 'px';
  tfPopup.style.top  = Math.max(TOOLBAR_H + 4, r.top - 46) + 'px';
  tfPopup.classList.add('visible');
}

function hideTextFormatPopup() {
  tfPopup.classList.remove('visible');
  tfTarget = null;
}

function applyTextFormat() {
  if (!tfTarget) return;
  tfTarget.style.fontFamily = tfFont.value;
  tfTarget.style.fontSize   = tfSize.value + 'px';
  tfTarget.style.color      = tfColor.value;
  // Widen input if needed
  if (tfTarget.tagName === 'INPUT') {
    tfTarget.style.width = Math.max(200, tfTarget.value.length * parseInt(tfSize.value) * 0.6) + 'px';
  }
}



// Apply format when controls change
tfFont.addEventListener('change', applyTextFormat);
tfSize.addEventListener('change', applyTextFormat);
tfColor.addEventListener('input',  applyTextFormat);

// Hide popup and deactivate labels when clicking outside
document.addEventListener('pointerdown', e => {
  // Deactivate all labels unless clicking inside one
  if (!e.target.closest('.canvas-label')) {
    document.querySelectorAll('.canvas-label.active').forEach(l => l.classList.remove('active'));
  }
  if (!tfPopup.classList.contains('visible')) return;
  if (tfPopup.contains(e.target)) return;
  if (e.target.classList.contains('canvas-label-input')) return;
  if (e.target.classList.contains('sb-text-area')) return;
  hideTextFormatPopup();
});

// ═══════════════════════════════════════════════════════════
// AUDIO / WAVEFORM
// ═══════════════════════════════════════════════════════════
let audioContext = null;
function getAudioContext() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  return audioContext;
}

function addWaveform(opts) {
  state.waveformCount++;
  const id = 'waveform-' + Date.now();
  const x = opts?.x ?? 200;
  const y = opts?.y ?? 300;
  const w = opts?.w ?? 700;
  const filename = opts?.filename ?? 'Audio Track';
  const samples = opts?.samples ?? null;

  const block = document.createElement('div');
  block.className = 'waveform-block';
  block.id = id;
  block.style.left = x + 'px';
  block.style.top  = y + 'px';
  block.style.width = w + 'px';

  block.innerHTML = `
    <div class="waveform-header">
      <span class="waveform-title">${filename}</span>
      <button class="waveform-ctrl" id="wc-play-${id}" title="Play/Pause">▶</button>
      <button class="waveform-ctrl" id="wc-stop-${id}" title="Stop">■</button>
      <div class="waveform-vol-wrap" id="wc-vol-wrap-${id}">
        <button class="waveform-vol-btn" id="wc-mute-${id}" title="Mute">🔊</button>
        <input class="waveform-vol-slider" id="wc-vol-${id}" type="range" min="0" max="1" step="0.01" value="1" title="Volume">
      </div>
      <button class="waveform-ctrl" id="wc-compact-${id}" title="Toggle compact mode">⊖</button>
      <button class="waveform-ctrl" id="wc-pin-${id}" title="Pin (lock position)">⊙</button>
      <button class="waveform-ctrl" id="wc-del-${id}" title="Remove">✕</button>
    </div>

    <div class="waveform-body" id="wc-body-${id}">
      <canvas class="waveform-canvas" id="wc-canvas-${id}"></canvas>
      <div class="waveform-playhead" id="wc-head-${id}"></div>
    </div>
    <div class="waveform-resize-l" id="wc-rl-${id}"></div>
    <div class="waveform-resize-r" id="wc-rr-${id}"></div>
    <div class="waveform-resize-b" id="wc-rb-${id}"></div>
  `;

  infiniteCanvas.appendChild(block);

  const header   = block.querySelector('.waveform-header');
  const body     = block.querySelector('.waveform-body');
  const canvas   = block.querySelector('.waveform-canvas');
  const playhead = block.querySelector('.waveform-playhead');

  // ── Core model ───────────────────────────────────────────────
  // pxPerSec is the ONLY source of truth for time↔position mapping.
  // It is recomputed whenever the block is resized:
  //   pxPerSec = blockWidth / audioDuration
  // Playhead left (px) = currentTime * pxPerSec   ← never uses % or ratio
  // Scrub time (s)     = clickPxFromLeft / pxPerSec
  // Resizing changes pxPerSec and immediately repositions the playhead.

  const gainNode = getAudioContext().createGain();
  gainNode.gain.value = 1;
  gainNode.connect(getAudioContext().destination);

  const wState = {
    audioBuffer: null, source: null,
    playing: false, startTime: 0, pauseOffset: 0,
    samples: null, volume: 1, muted: false,
  };

  // pxPerSec: derived from block width and audio duration.
  // Recomputed on every resize and after audio loads.
  function getPxPerSec() {
    if (!wState.audioBuffer) return 100;
    return body.offsetWidth / wState.audioBuffer.duration;
  }

  // ── Rendering ─────────────────────────────────────────────────
  function renderWaveform() {
    const W = body.offsetWidth || 600;
    const H = body.offsetHeight || 64;
    canvas.width  = W;
    canvas.height = H;
    const wctx = canvas.getContext('2d');

    // Background
    const grd = wctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(1, '#ffffff');
    wctx.fillStyle = grd;
    wctx.fillRect(0, 0, W, H);

    if (!wState.samples || wState.samples.length === 0) {
      wctx.fillStyle = '#64748b';
      wctx.font = '11px Inter, sans-serif';
      wctx.textAlign = 'center';
      wctx.fillText('Loading…', W / 2, H / 2 + 4);
      return;
    }

    const samps = wState.samples;
    // Reserve bottom 20px for the time ruler so bars don't overlap it
    const RULER_H = 20;
    const waveH   = H - RULER_H;
    const mid     = waveH / 2;
    for (let i = 0; i < W; i++) {
      const si = Math.floor(i / W * samps.length);
      const amp = samps[si] || 0;
      const h   = Math.max(1, amp * (waveH - 4));
      wctx.fillStyle = '#3b82f6';
      wctx.fillRect(i, mid - h/2, 1, h);
    }

    // Centre line — only through the wave area
    wctx.strokeStyle = '#e2e8f0';
    wctx.lineWidth   = 1;
    wctx.beginPath();
    wctx.moveTo(0, mid); wctx.lineTo(W, mid);
    wctx.stroke();

    // Ruler separator line
    wctx.strokeStyle = '#e2e8f0';
    wctx.lineWidth   = 1;
    wctx.beginPath();
    wctx.moveTo(0, waveH); wctx.lineTo(W, waveH);
    wctx.stroke();

    // Time ruler — tick every second, label every 5s
    if (wState.audioBuffer) {
      const pps = getPxPerSec();
      const dur = wState.audioBuffer.duration;
      wctx.font = '8px Inter, sans-serif';
      wctx.textAlign = 'center';
      for (let s = 0; s <= Math.ceil(dur); s++) {
        const x = s * pps;
        if (x > W) break;
        const tickH = s % 5 === 0 ? 8 : 4;
        wctx.fillStyle = '#3b82f6';
        wctx.fillRect(x, waveH + 1, 1, tickH);
        if (s % 5 === 0 && x > 12) {
          wctx.fillStyle = '#3b82f6';
          const m = Math.floor(s/60), sc = s%60;
          wctx.fillText(`${m}:${sc.toString().padStart(2,'0')}`, x, H - 2);
        }
      }
    }

    // Re-pin playhead after redraw
    updatePlayheadPos();
  }

  // ── Playhead positioning ──────────────────────────────────────
  // ONLY function that sets playhead.style.left.
  // Input: time in seconds → output: px from left edge of body.
  function updatePlayheadPos() {
    const t   = currentTime();
    const px  = t * getPxPerSec();
    playhead.style.left = px + 'px';
  }

  // ── Playback time ─────────────────────────────────────────────
  function currentTime() {
    if (!wState.playing) return wState.pauseOffset;
    const elapsed = getAudioContext().currentTime - wState.startTime + wState.pauseOffset;
    return Math.min(elapsed, wState.audioBuffer ? wState.audioBuffer.duration : elapsed);
  }

  // ── Animation loop ────────────────────────────────────────────
  let animId = null;
  function tick() {
    updatePlayheadPos();
    if (wState.audioBuffer && currentTime() < wState.audioBuffer.duration) {
      animId = requestAnimationFrame(tick);
    } else if (wState.playing) {
      stopAudio();
    }
  }

  // ── Playback controls ─────────────────────────────────────────
  function playAudio() {
    if (!wState.audioBuffer || wState.playing) return;
    getAudioContext().resume();
    wState.source = getAudioContext().createBufferSource();
    wState.source.buffer = wState.audioBuffer;
    wState.source.connect(gainNode);
    wState.source.start(0, wState.pauseOffset);
    wState.startTime = getAudioContext().currentTime;
    wState.playing   = true;
    block.querySelector(`#wc-play-${id}`).textContent = '⏸';

    tick();
  }

  function pauseAudio() {
    if (!wState.playing) return;
    wState.pauseOffset = currentTime();
    try { wState.source.stop(); } catch(e) {}
    wState.playing = false;
    block.querySelector(`#wc-play-${id}`).textContent = '▶';

    cancelAnimationFrame(animId);
  }

  function stopAudio() {
    if (wState.source && wState.playing) { try { wState.source.stop(); } catch(e) {} }
    wState.playing     = false;
    wState.pauseOffset = 0;
    block.querySelector(`#wc-play-${id}`).textContent = '▶';

    cancelAnimationFrame(animId);
    updatePlayheadPos();
  }

  block.querySelector(`#wc-play-${id}`).addEventListener('click', () => wState.playing ? pauseAudio() : playAudio());
  block.querySelector(`#wc-stop-${id}`).addEventListener('click', stopAudio);
  block.querySelector(`#wc-del-${id}`).addEventListener('click', () => { stopAudio(); block.remove(); });

  // ── Volume ────────────────────────────────────────────────────
  const volSlider = block.querySelector(`#wc-vol-${id}`);
  const muteBtn   = block.querySelector(`#wc-mute-${id}`);
  function applyVolume() {
    gainNode.gain.value = wState.muted ? 0 : wState.volume;
    muteBtn.textContent = wState.muted ? '🔇' : wState.volume < 0.5 ? '🔉' : '🔊';
    muteBtn.classList.toggle('muted', wState.muted);
  }
  volSlider.addEventListener('input', e => {
    wState.volume = parseFloat(e.target.value);
    if (wState.muted && wState.volume > 0) wState.muted = false;
    applyVolume();
  });
  volSlider.addEventListener('mousedown', e => e.stopPropagation());
  muteBtn.addEventListener('click', () => { wState.muted = !wState.muted; applyVolume(); });

  // ── Compact toggle ────────────────────────────────────────────
  const compactBtn = block.querySelector(`#wc-compact-${id}`);
  const volWrap    = block.querySelector(`#wc-vol-wrap-${id}`);
  const titleEl    = block.querySelector('.waveform-title');
  let   isCompact  = false;

  compactBtn.addEventListener('click', () => {
    isCompact = !isCompact;
    titleEl.style.display  = isCompact ? 'none' : '';
    volWrap.style.display  = isCompact ? 'none' : '';
    compactBtn.textContent = isCompact ? '⊕' : '⊖';
    compactBtn.title       = isCompact ? 'Expand controls' : 'Toggle compact mode';
  });

  // ── Floating control panel ─────────────────────────────────────
  // A completely independent DOM element at z-index:9999.
  // Created when waveform is pinned, destroyed when unpinned.
  // All audio functions are in scope here (inside addWaveform closure).
  let ctrlPanel = null;

  function buildCtrlPanel() {
    if (ctrlPanel) return;
    ctrlPanel = document.createElement('div');
    ctrlPanel.className = 'wf-ctrl-panel';
    // Position above the waveform
    const bx = parseFloat(block.style.left) || 0;
    const by = parseFloat(block.style.top)  || 0;
    // Position in the bottom-left of the currently visible canvas area,
    // with a small margin so it's never clipped or out of reach.
    const margin = 16;
    const panelW = 260; // approximate width before render
    const panelH = 58;  // approximate height before render
    const viewL  = container.scrollLeft / state.zoom;
    const viewT  = container.scrollTop  / state.zoom;
    const viewW  = window.innerWidth    / state.zoom;
    const viewH  = (window.innerHeight - TOOLBAR_H - 26) / state.zoom;
    ctrlPanel.style.left = (viewL + margin) + 'px';
    ctrlPanel.style.top  = (viewT + viewH - panelH - margin) + 'px';

    ctrlPanel.innerHTML = `
      <div class="wf-ctrl-panel-header">
        <span class="wf-ctrl-panel-drag"></span>
        <button class="wf-c-btn" id="wcp-close-${id}" title="Close" style="font-size:11px;width:20px;height:20px;">✕</button>
      </div>
      <div class="wf-ctrl-panel-body">
        <button class="wf-c-btn" id="wcp-rew-${id}"  title="Back 5s">⏮</button>
        <button class="wf-c-btn" id="wcp-play-${id}" title="Play / Pause">▶</button>
        <button class="wf-c-btn" id="wcp-stop-${id}" title="Stop">■</button>
        <button class="wf-c-btn" id="wcp-fwd-${id}"  title="Forward 5s">⏭</button>
        <div class="wf-c-sep"></div>
        <button class="wf-c-btn" id="wcp-mute-${id}" title="Mute">🔊</button>
        <input  class="wf-c-vol" id="wcp-vol-${id}"  type="range" min="0" max="1" step="0.01" value="1">
        <div class="wf-c-sep"></div>
        <button class="wf-c-btn" id="wcp-pin-${id}"  title="Unpin waveform" style="font-size:13px;">⊗</button>
      </div>
    `;

    // Append directly to infiniteCanvas so it's in canvas space
    infiniteCanvas.appendChild(ctrlPanel);

    // Draggable by its header
    const ph = ctrlPanel.querySelector('.wf-ctrl-panel-header');
    makeDraggable(ctrlPanel, ph);

    // Refs
    const cpPlay  = ctrlPanel.querySelector(`#wcp-play-${id}`);
    const cpStop  = ctrlPanel.querySelector(`#wcp-stop-${id}`);
    const cpRew   = ctrlPanel.querySelector(`#wcp-rew-${id}`);
    const cpFwd   = ctrlPanel.querySelector(`#wcp-fwd-${id}`);
    const cpMute  = ctrlPanel.querySelector(`#wcp-mute-${id}`);
    const cpVol   = ctrlPanel.querySelector(`#wcp-vol-${id}`);
    const cpPin   = ctrlPanel.querySelector(`#wcp-pin-${id}`);
    const cpClose = ctrlPanel.querySelector(`#wcp-close-${id}`);

    // Sync display state
    function syncPanel() {
      cpPlay.textContent = wState.playing ? '⏸' : '▶';
      cpPlay.classList.toggle('playing', wState.playing);
      cpMute.textContent = wState.muted ? '🔇' : wState.volume < 0.5 ? '🔉' : '🔊';
      cpMute.classList.toggle('muted', wState.muted);
      cpVol.value = wState.volume;
    }

    function cpSkip(secs) {
      if (!wState.audioBuffer) return;
      const cur = wState.playing
        ? getAudioContext().currentTime - wState.startTime + wState.pauseOffset
        : wState.pauseOffset;
      const t = Math.max(0, Math.min(wState.audioBuffer.duration, cur + secs));
      const wasPlaying = wState.playing;
      if (wasPlaying) {
        try { wState.source.stop(); } catch(e) {}
        cancelAnimationFrame(animId);
        wState.playing = false;
      }
      wState.pauseOffset = t;
      updatePlayheadPos();
      if (wasPlaying) playAudio();
      syncPanel();
    }

    // Use pointerup for all buttons — pen tablets fire pointer events
    // reliably but click synthesis can be inconsistent with stylus input.
    // stopPropagation on pointerdown prevents the drawing engine grabbing the event.
    function cpBind(el, fn) {
      el.addEventListener('pointerdown', e => { e.stopPropagation(); e.preventDefault(); });
      el.addEventListener('pointerup',   e => { e.stopPropagation(); fn(e); });
    }

    cpBind(cpPlay,  () => { wState.playing ? pauseAudio() : playAudio(); syncPanel(); });
    cpBind(cpStop,  () => { stopAudio(); syncPanel(); });
    cpBind(cpRew,   () => cpSkip(-5));
    cpBind(cpFwd,   () => cpSkip(5));
    cpBind(cpMute,  () => { wState.muted = !wState.muted; applyVolume(); syncPanel(); });
    cpBind(cpPin,   () => pinBtn.click());
    cpBind(cpClose, () => removeCtrlPanel());

    // Volume slider needs special handling — pointerdown starts drag, input fires during
    cpVol.addEventListener('pointerdown', e => { e.stopPropagation(); });
    cpVol.addEventListener('pointermove', e => { e.stopPropagation(); });
    cpVol.addEventListener('pointerup',   e => { e.stopPropagation(); });
    cpVol.addEventListener('input', e => {
      wState.volume = parseFloat(e.target.value);
      if (wState.muted && wState.volume > 0) wState.muted = false;
      applyVolume(); syncPanel();
      volSlider.value = e.target.value;
    });

    syncPanel();

    // ── Hover tool swap — same behaviour as pre-pin header ──────
    let _cpSavedTool = null;
    ctrlPanel.addEventListener('mouseenter', () => {
      if (state.tool === 'draw' || state.tool === 'erase' || state.tool === 'shape') {
        _cpSavedTool = state.tool;
        setTool('select');
      }
    });
    ctrlPanel.addEventListener('mouseleave', () => {
      if (_cpSavedTool) { setTool(_cpSavedTool); _cpSavedTool = null; }
    });
  }

  function removeCtrlPanel() {
    if (!ctrlPanel) return;
    ctrlPanel.remove();
    ctrlPanel = null;
  }

  // ── Pin ────────────────────────────────────────────────────────
  const pinBtn = block.querySelector(`#wc-pin-${id}`);
  makePinnable(block, pinBtn);

  // Watch pin state — show/hide control panel accordingly
  new MutationObserver(() => {
    if (block.dataset.pinned === 'true') {
      buildCtrlPanel();
    } else {
      removeCtrlPanel();
    }
  }).observe(block, { attributes: true, attributeFilter: ['data-pinned'] });

  // ── Hover tool swap (unpinned only) ────────────────────────────
  let _savedTool = null;
  header.addEventListener('mouseenter', () => {
    if (block.dataset.pinned === 'true') return; // panel handles it when pinned
    if (state.tool === 'draw' || state.tool === 'erase' || state.tool === 'shape') {
      _savedTool = state.tool;
      setTool('select');
    }
  });
  header.addEventListener('mouseleave', () => {
    if (_savedTool) { setTool(_savedTool); _savedTool = null; }
  });

  // ── Scrubbing ─────────────────────────────────────────────────
  // clientX → canvas-space px from left edge of body → seconds
  // Uses getBoundingClientRect for left edge (screen space),
  // then divides by state.zoom to get canvas-space px.
  body.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    e.stopPropagation();
    // When pinned and using a pen, a tap on the waveform body should scrub,
    // not draw — so we capture the pointer here to prevent drawing engine
    // from claiming it.
    if (block.dataset.pinned === 'true') e.preventDefault();
    body.setPointerCapture(e.pointerId);
    function seek(ev) {
      if (!wState.audioBuffer) return;
      const r      = body.getBoundingClientRect();
      const screenPx = ev.clientX - r.left;
      const canvasPx = screenPx / state.zoom;
      const t = Math.max(0, Math.min(
        wState.audioBuffer.duration,
        canvasPx / getPxPerSec()
      ));
      const wasPlaying = wState.playing;
      if (wasPlaying) { try { wState.source.stop(); } catch(e){} cancelAnimationFrame(animId); wState.playing = false; }
      wState.pauseOffset = t;
      updatePlayheadPos();
      if (wasPlaying) playAudio();
    }
    seek(e);
    const onMove = ev => seek(ev);
    const onUp = () => {
      body.releasePointerCapture(e.pointerId);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });

  // ── Resize handles ────────────────────────────────────────────
  // Stretching changes the visual scale (pxPerSec) which changes how much
  // of the song is visible. Playhead is immediately repositioned.
  function makeResizeHandle(handleEl, side) {
    handleEl.addEventListener('pointerdown', e => {
      if (block.dataset.pinned === 'true') return;
      e.stopPropagation(); e.preventDefault();
      handleEl.setPointerCapture(e.pointerId);
      const startX  = e.clientX;
      const startW  = parseFloat(block.style.width) || block.offsetWidth;
      const startL  = parseFloat(block.style.left)  || 0;
      const onMove  = ev => {
        const dx = (ev.clientX - startX) / state.zoom;
        if (side === 'r') {
          block.style.width = Math.max(200, startW + dx) + 'px';
        } else {
          const newW = Math.max(200, startW - dx);
          block.style.left  = (startL + startW - newW) + 'px';
          block.style.width = newW + 'px';
        }
        renderWaveform();
      };
      const onUp = () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
    });
  }
  makeResizeHandle(block.querySelector(`#wc-rl-${id}`), 'l');
  makeResizeHandle(block.querySelector(`#wc-rr-${id}`), 'r');

  // Bottom edge — drag to change height
  const resizeB = block.querySelector(`#wc-rb-${id}`);
  resizeB.addEventListener('pointerdown', e => {
    e.stopPropagation(); e.preventDefault();
    resizeB.setPointerCapture(e.pointerId);
    const startY = e.clientY;
    const startH = block.offsetHeight;
    const onMove = ev => {
      const dy = (ev.clientY - startY) / state.zoom;
      block.style.height = Math.max(60, startH + dy) + 'px';
      renderWaveform();
    };
    const onUp = () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });

  // ── Drag ──────────────────────────────────────────────────────
  makeDraggable(block, header, null);
  // makeDraggable already checks dataset.pinned — no extra guard needed

  // ── Load samples ──────────────────────────────────────────────
  function loadSamples(buffer) {
    wState.audioBuffer = buffer;
    const data = buffer.getChannelData(0);
    const targetSamples = 4000;
    const step = Math.max(1, Math.floor(data.length / targetSamples));
    const s = [];
    for (let i = 0; i < targetSamples; i++) s.push(Math.abs(data[i * step] || 0));
    wState.samples = s;
    requestAnimationFrame(renderWaveform);
  }

  // Initial render
  requestAnimationFrame(renderWaveform);

  return { block, wState, loadSamples };
}

const dropOverlay = document.getElementById('drop-overlay');

container.addEventListener('dragleave', e => { if (e.relatedTarget === null || !container.contains(e.relatedTarget)) dropOverlay.classList.remove('visible'); });

  e.preventDefault();
  dropOverlay.classList.remove('visible');
  const pos = toCanvas(e.clientX, e.clientY);
  Array.from(e.dataTransfer.files).forEach(file => {
    if (file.type.startsWith('audio/') || file.name.match(/\.(mp3|wav|ogg|flac|aac|m4a)$/i)) {
      const { block, loadSamples } = addWaveform({ x: pos.x - 300, y: pos.y, filename: file.name });
      const reader = new FileReader();
      reader.onload = ev => { getAudioContext().decodeAudioData(ev.target.result.slice(0), buf => loadSamples(buf)); };
      reader.readAsArrayBuffer(file);
    } else if (file.type.startsWith('image/') || file.name.match(/\.(jpg|jpeg|png|gif|webp|tiff|tif|bmp)$/i)) {
      const reader = new FileReader();
      reader.onload = ev => addCanvasImage(ev.target.result, pos.x, pos.y);
      reader.readAsDataURL(file);
