function saveProject() {
  const proj = {
    version: 1,
    pan: { x: container.scrollLeft, y: container.scrollTop, zoom: state.zoom },
    zoom: state.zoom,
    frames: [],
    labels: [],
    images: [],
    drawingData: drawCanvas.toDataURL(),
    strokeHistory: strokeHistory.map(s => ({
      points: s.points,
      color: s.color,
      isErase: s.isErase,
      offsetX: s.offsetX || 0,
      offsetY: s.offsetY || 0,
    })),
  };

  // Frames
  document.querySelectorAll('.sb-frame').forEach(frame => {
    const title = frame.querySelector('.sb-frame-title').value;
    const activeTab = frame.querySelector('.sb-tab.active')?.dataset.tab ?? 'draw';
    const textContent = frame.querySelector('.sb-text-area')?.value ?? '';
    const imgEl = frame.querySelector('[data-pane="image"] img');
    const vidEl = frame.querySelector('[data-pane="image"] video');
    const ifrEl = frame.querySelector('[data-pane="image"] iframe');
    const drawC = frame.querySelector('.sb-draw-canvas');
    let imgSrc = null;
    if (imgEl) imgSrc = imgEl.src;
    else if (vidEl) imgSrc = vidEl.src;
    else if (ifrEl) {
      const ytMatch = ifrEl.src.match(/embed\/([a-zA-Z0-9_-]{11})/);
      if (ytMatch) imgSrc = 'yt:' + ytMatch[1];
    }
    proj.frames.push({
      x: parseFloat(frame.style.left), y: parseFloat(frame.style.top),
      w: frame.offsetWidth, h: frame.offsetHeight,
      title, activeTab, textContent,
      imgSrc,
      drawData: drawC ? drawC.toDataURL() : null,
    });
  });

  // Labels
  document.querySelectorAll('.canvas-label').forEach(lbl => {
    proj.labels.push({
      x: parseFloat(lbl.style.left), y: parseFloat(lbl.style.top),
      text: lbl.querySelector('input').value,
    });
  });

  // Canvas images
  document.querySelectorAll('.canvas-image').forEach(ci => {
    const img = ci.querySelector('img');
    proj.images.push({
      x: parseFloat(ci.style.left), y: parseFloat(ci.style.top),
      src: img.src, w: img.style.width, h: img.style.height,
    });
  });

  const blob = new Blob([JSON.stringify(proj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'musicboard-project.json';
  a.click();
}

function loadProject(proj) {
  // Clear existing
  document.querySelectorAll('.sb-frame, .canvas-label, .canvas-image, .waveform-block').forEach(el => el.remove());
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  state.frameCount = 0; state.labelCount = 0; state.imageCount = 0;

  const _cw = window.innerWidth, _ch = window.innerHeight - 84 - 26;
  state.zoom = proj.pan?.zoom ?? Math.max(getMinZoom(), 1);
  state.zoom = Math.max(getMinZoom(), state.zoom);
  applyTransform();
  // Restore scroll position, defaulting to canvas centre
  container.scrollLeft = proj.pan?.x ?? (CANVAS_SIZE * state.zoom / 2 - _cw / 2);
  container.scrollTop  = proj.pan?.y ?? (CANVAS_SIZE * state.zoom / 2 - _ch / 2);
  state.zoom = proj.zoom ?? 1;
  applyTransform();

  // Restore stroke history (vector) — preferred over raster fallback
  strokeHistory = [];
  selectedStroke = null;
  octx.clearRect(0, 0, overlay.width, overlay.height);
  if (proj.strokeHistory && proj.strokeHistory.length > 0) {
    strokeHistory = proj.strokeHistory;
    redrawAllStrokes();
  } else if (proj.drawingData) {
    // Legacy raster fallback for old saves
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = proj.drawingData;
  }

  (proj.frames || []).forEach(f => {
    const frame = addFrame(f);
    // Restore draw canvas
    if (f.drawData) {
      const dc = frame.querySelector('.sb-draw-canvas');
      const img = new Image();
      img.onload = () => { resizeSbCanvas(frame); dc.getContext('2d').drawImage(img, 0, 0, dc.width, dc.height); };
      img.src = f.drawData;
    }
  });

  (proj.labels || []).forEach(l => addLabel(l.x, l.y, l.text));

  (proj.images || []).forEach(im => {
    const el = addCanvasImage(im.src, im.x, im.y);
    const img = el.querySelector('img');
    if (im.w) { img.style.maxWidth = 'none'; img.style.width = im.w; }
    if (im.h) img.style.height = im.h;
  });
}

let tutorialFrame = null;

function openTutorial() {
  // If already on canvas, just scroll to it and bring to front
  if (tutorialFrame && document.contains(tutorialFrame)) {
    tutorialFrame.style.zIndex = 200;
    // Pan canvas so tutorial is visible
    const tx = parseFloat(tutorialFrame.style.left) || 100;
    const ty = parseFloat(tutorialFrame.style.top)  || 100;
    container.scrollLeft = tx * state.zoom - window.innerWidth  / 2 + 200;
    container.scrollTop  = ty * state.zoom - (window.innerHeight - 84) / 2 + 150;
    return;
  }
  // Create it near current view centre
  const cx = (container.scrollLeft + window.innerWidth  / 2) / state.zoom - 220;
  const cy = (container.scrollTop  + (window.innerHeight - 84) / 2) / state.zoom - 300;
  tutorialFrame = addFrame({
    x: cx, y: cy, w: 440, h: 600,
    title: 'How To Use MusicBoard',
    activeTab: 'text',
    textContent: TUTORIAL_TEXT,
  });
  tutorialFrame.style.zIndex = 200;
  // Make textarea monospaced and slightly smaller for the dense text
  const ta = tutorialFrame.querySelector('.sb-text-area');
  ta.style.fontSize = '11px';
  ta.style.lineHeight = '1.7';
  ta.style.whiteSpace = 'pre';
}

document.getElementById('btn-tutorial').addEventListener('click', openTutorial);

document.getElementById('btn-recenter').addEventListener('click', () => {

const MAX_WORKSPACES = 8;

// Snapshot of a workspace — everything needed to restore it
function captureWorkspace(ws) {
  ws.scrollLeft   = container.scrollLeft;
  ws.scrollTop    = container.scrollTop;
  ws.zoom         = state.zoom;
  ws.strokeHistory = strokeHistory.map(s => ({ ...s, points: [...s.points] }));
  ws.drawingData  = drawCanvas.toDataURL();
  ws.frames = [];
  document.querySelectorAll('.sb-frame').forEach(frame => {
    const titleEl = frame.querySelector('.sb-frame-title');
    const activeTab = frame.querySelector('.sb-tab.active')?.dataset.tab ?? 'draw';
    const textContent = frame.querySelector('.sb-text-area')?.value ?? '';
    const imgEl  = frame.querySelector('[data-pane="image"] img');
    const vidEl  = frame.querySelector('[data-pane="image"] video');
    const ifrEl  = frame.querySelector('[data-pane="image"] iframe');
    const drawC  = frame.querySelector('.sb-draw-canvas');
    let imgSrc = null;
    if (imgEl) imgSrc = imgEl.src;
    else if (vidEl) imgSrc = vidEl.src;
    else if (ifrEl) { const m = ifrEl.src.match(/embed\/([a-zA-Z0-9_-]{11})/); if (m) imgSrc = 'yt:' + m[1]; }
    ws.frames.push({
      x: parseFloat(frame.style.left), y: parseFloat(frame.style.top),
      w: frame.offsetWidth, h: frame.offsetHeight,
      title: titleEl ? titleEl.value : '',
      activeTab, textContent, imgSrc,
      drawData: drawC ? drawC.toDataURL() : null,
    });
  });
  ws.labels = [];
  document.querySelectorAll('.canvas-label').forEach(lbl => {
    ws.labels.push({ x: parseFloat(lbl.style.left), y: parseFloat(lbl.style.top), text: lbl.querySelector('input').value });
  });
  ws.images = [];
  document.querySelectorAll('.canvas-image').forEach(ci => {
    const img = ci.querySelector('img');
    ws.images.push({ x: parseFloat(ci.style.left), y: parseFloat(ci.style.top), src: img.src, w: img.style.width, h: img.style.height });
  });
  // Capture waveform (position + size only — audio buffer can't be serialised)
  ws.waveforms = [];
  document.querySelectorAll('.waveform-block').forEach(wb => {
    ws.waveforms.push({ x: parseFloat(wb.style.left), y: parseFloat(wb.style.top), w: parseFloat(wb.style.width) || wb.offsetWidth, h: wb.offsetHeight, filename: wb.querySelector('.waveform-title')?.textContent ?? '' });
  });
}

function restoreWorkspace(ws) {
  // Clear current canvas
  document.querySelectorAll('.sb-frame, .canvas-label, .canvas-image, .waveform-block').forEach(el => el.remove());
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  octx.clearRect(0, 0, overlay.width, overlay.height);
  strokeHistory = []; selectedStroke = null;
  state.frameCount = 0; state.labelCount = 0; state.imageCount = 0;

  // Restore zoom + scroll
  state.zoom = Math.max(getMinZoom(), ws.zoom ?? 1);
  applyTransform();
  requestAnimationFrame(() => {
    container.scrollLeft = ws.scrollLeft ?? 0;
    container.scrollTop  = ws.scrollTop  ?? 0;
  });

  // Restore strokes
  if (ws.strokeHistory && ws.strokeHistory.length > 0) {
    strokeHistory = ws.strokeHistory;
    redrawAllStrokes();
  } else if (ws.drawingData && ws.drawingData !== 'data:,') {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = ws.drawingData;
  }

  // Restore frames
  (ws.frames || []).forEach(f => {
    const frame = addFrame(f);
    if (f.drawData) {
      const dc = frame.querySelector('.sb-draw-canvas');
      const img = new Image();
      img.onload = () => { resizeSbCanvas(frame); dc.getContext('2d').drawImage(img, 0, 0, dc.width, dc.height); };
      img.src = f.drawData;
    }
  });

  (ws.labels  || []).forEach(l => addLabel(l.x, l.y, l.text));
  (ws.images  || []).forEach(im => {
    const el = addCanvasImage(im.src, im.x, im.y);
    const img = el.querySelector('img');
    if (im.w) { img.style.maxWidth = 'none'; img.style.width = im.w; }
    if (im.h) img.style.height = im.h;
  });
  // Waveforms lose their audio on switch (browser limitation) — restore visual only
  (ws.waveforms || []).forEach(wv => addWaveform({ x: wv.x, y: wv.y, w: wv.w, filename: wv.filename }).block.style.height = wv.h + 'px');
}

// Initial workspace data
function emptyWorkspace(name) {
  return { name, frames: [], labels: [], images: [], waveforms: [], strokeHistory: [], drawingData: null, scrollLeft: 0, scrollTop: 0, zoom: 1 };
}

let workspaces = [ emptyWorkspace('Workspace 1') ];
let activeWsIdx = 0;

// ── Tab bar rendering ──────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  // Remove existing tabs (keep the + button)
  bar.querySelectorAll('.ws-tab').forEach(t => t.remove());
  const addBtn = document.getElementById('tab-add');
  addBtn.disabled = workspaces.length >= MAX_WORKSPACES;

  workspaces.forEach((ws, i) => {
    const tab = document.createElement('div');
    tab.className = 'ws-tab' + (i === activeWsIdx ? ' active' : '');
    tab.dataset.idx = i;

    const nameEl = document.createElement('input');
    nameEl.className = 'ws-tab-name';
    nameEl.value = ws.name;
    nameEl.title = 'Double-click to rename';
    nameEl.addEventListener('dblclick', e => { e.stopPropagation(); nameEl.focus(); nameEl.select(); });
    nameEl.addEventListener('blur', () => { workspaces[i].name = nameEl.value || `Workspace ${i+1}`; });
    nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') nameEl.blur(); e.stopPropagation(); });
    nameEl.addEventListener('mousedown', e => { if (i !== activeWsIdx) e.preventDefault(); });

    const closeBtn = document.createElement('button');
    closeBtn.className = 'ws-tab-close';
    closeBtn.textContent = '✕';
    closeBtn.title = 'Close workspace';
    closeBtn.addEventListener('click', e => { e.stopPropagation(); removeWorkspace(i); });

    if (workspaces.length > 1) tab.appendChild(closeBtn);
    tab.appendChild(nameEl);

    tab.addEventListener('mousedown', e => {
      if (e.target === closeBtn) return;
      if (i !== activeWsIdx) switchWorkspace(i);
    });

    bar.insertBefore(tab, addBtn);
  });
}

// ── Switch workspace ───────────────────────────────────────
function switchWorkspace(idx) {
  if (idx === activeWsIdx) return;
  captureWorkspace(workspaces[activeWsIdx]);
  activeWsIdx = idx;
  restoreWorkspace(workspaces[activeWsIdx]);
  renderTabs();
}

// ── Add workspace ──────────────────────────────────────────
function addWorkspace() {
  if (workspaces.length >= MAX_WORKSPACES) return;
  captureWorkspace(workspaces[activeWsIdx]);
  const n = workspaces.length + 1;
  workspaces.push(emptyWorkspace(`Workspace ${n}`));
  activeWsIdx = workspaces.length - 1;
  restoreWorkspace(workspaces[activeWsIdx]);
  // Centre new workspace
  const vw = window.innerWidth, vh = window.innerHeight - 84 - 26;
  state.zoom = Math.max(getMinZoom(), 1);
  applyTransform();
  container.scrollLeft = CANVAS_SIZE * state.zoom / 2 - vw / 2;
  container.scrollTop  = CANVAS_SIZE * state.zoom / 2 - vh / 2;
  renderTabs();
}

// ── Remove workspace ───────────────────────────────────────
function removeWorkspace(idx) {
  if (workspaces.length <= 1) return; // always keep at least one
  workspaces.splice(idx, 1);
  if (activeWsIdx >= workspaces.length) activeWsIdx = workspaces.length - 1;
  restoreWorkspace(workspaces[activeWsIdx]);
  renderTabs();
}

document.getElementById('tab-add').addEventListener('click', addWorkspace);

// ── Patch saveProject to include all workspaces ────────────
const _origSaveProject = saveProject;
function saveProject() {
  // Snapshot active workspace first
  captureWorkspace(workspaces[activeWsIdx]);
  const proj = {
    version: 2,
    activeWs: activeWsIdx,
    workspaces: workspaces.map(ws => ({
      name: ws.name,
      zoom: ws.zoom,
      scrollLeft: ws.scrollLeft,
      scrollTop: ws.scrollTop,
      strokeHistory: ws.strokeHistory,
      frames: ws.frames,
      labels: ws.labels,
      images: ws.images,
      waveforms: ws.waveforms,
    })),
  };
  const blob = new Blob([JSON.stringify(proj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'musicboard-project.json';
  a.click();
}

// ── Patch loadProject to restore all workspaces ────────────
const _origLoadProject = loadProject;
function loadProject(proj) {
  if (proj.version === 2 && proj.workspaces) {
    // Multi-workspace save
    workspaces = proj.workspaces.map(ws => ({
      name: ws.name || 'Workspace',
      zoom: ws.zoom ?? 1,
      scrollLeft: ws.scrollLeft ?? 0,
      scrollTop: ws.scrollTop ?? 0,
      strokeHistory: ws.strokeHistory || [],
      frames: ws.frames || [],
      labels: ws.labels || [],
      images: ws.images || [],
      waveforms: ws.waveforms || [],
      drawingData: null,
    }));
    activeWsIdx = Math.min(proj.activeWs ?? 0, workspaces.length - 1);
    restoreWorkspace(workspaces[activeWsIdx]);
    renderTabs();
  } else {
    // Legacy single-workspace save
    workspaces = [ emptyWorkspace('Workspace 1') ];
    activeWsIdx = 0;
    _origLoadProject(proj);
    renderTabs();
  }
}

// ═══════════════════════════════════════════════════════════
// WELCOME: add one sample frame to get started
// ═══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  // Centre the 8000×8000 canvas in the viewport so there's equal drawing
  // room in all directions. The canvas origin (0,0) maps to the top-left
  // of infinite space; we pan so the centre (4000,4000) is at screen centre.
  const CANVAS_CENTRE = CANVAS_SIZE / 2;  // 4000

  // Available viewport height excludes toolbar (52px) and status bar (26px)
  const vw = window.innerWidth;
  const vh = window.innerHeight - 84 - 26;

  // Ensure starting zoom respects viewport minimum
  state.zoom = Math.max(getMinZoom(), state.zoom);
  applyTransform();
  // Scroll to centre of the 8000×8000 canvas
  container.scrollLeft = CANVAS_CENTRE * state.zoom - vw / 2;
  container.scrollTop  = CANVAS_CENTRE * state.zoom - vh / 2;

  // Place welcome frames near the canvas centre
  const fx = CANVAS_CENTRE - 420;
  const fy = CANVAS_CENTRE - 180;

  addFrame({ x: fx,       y: fy, w: 260, h: 200, title: 'Shot 01 — Intro', activeTab: 'text', textContent: 'Describe your opening shot here…' });
  addFrame({ x: fx + 300, y: fy, w: 260, h: 200, title: 'Shot 02', activeTab: 'draw' });
  addFrame({ x: fx,       y: fy + 240, w: 260, h: 200, title: 'Shot 03', activeTab: 'draw' });

  // Welcome label
  const lbl = addLabel(fx + 600, fy, '← Drop an audio file anywhere or click ♫ in the toolbar');
  lbl.querySelector('input').style.width = '460px';
  lbl.querySelector('input').style.color = '#888';
  lbl.querySelector('input').style.fontSize = '12px';

  // Capture initial state into workspace 1 and render tabs
  captureWorkspace(workspaces[0]);
  renderTabs();
});

// ═══════════════════════════════════════════════════════════
// PWA — register service worker (only on real HTTP/S origins)
// ═══════════════════════════════════════════════════════════
if (location.protocol !== 'file:' && 'serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Show notice if running as file:// (YouTube won't work)
if (location.protocol === 'file:') {
  const notice = document.getElementById('file-notice');
  if (notice) {
    notice.classList.add('visible');
    document.getElementById('file-notice-close').addEventListener('click', () => {
      notice.classList.remove('visible');
    });
  }
}
</script>
