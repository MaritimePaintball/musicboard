<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MusicBoard — Video Storyboard Studio</title>

<!-- SEO & sharing -->
<meta name="description" content="A freeform storyboarding tool for music videos. Infinite canvas, audio waveforms, drawing tablet support, and storyboard frames.">
<meta name="author" content="MusicBoard">
<meta property="og:title" content="MusicBoard — Video Storyboard Studio">
<meta property="og:description" content="A freeform storyboarding canvas for music videos and video directors.">
<meta property="og:type" content="website">

<!-- PWA -->
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MusicBoard">
<link rel="manifest" href="manifest.json">

<!-- Fonts — preconnect for speed, swap prevents invisible text during load -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --canvas-bg: #ffffff;
    --panel: #ffffff;
    --panel2: #f8fafc;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent2: #60a5fa;
    --text: #1e293b;
    --text-inv: #ffffff;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --frame-bg: #ffffff;
    --frame-border: #e2e8f0;
    --waveform-bg: #1e293b;
    --waveform-wave: #3b82f6;
    --waveform-playhead: #60a5fa;
    --shadow: 0 4px 16px rgba(30,41,59,0.10);
    --shadow-sm: 0 2px 8px rgba(30,41,59,0.07);
    --shadow-btn: 0 1px 3px rgba(30,41,59,0.10), 0 1px 2px rgba(30,41,59,0.06);
    --radius: 8px;
    --radius-sm: 6px;
    --radius-lg: 12px;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    user-select: none;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: var(--panel);
    display: flex; align-items: center; gap: 0;
    z-index: 1000;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(30,41,59,0.06);
    overflow: hidden;
  }

  #logo {
    padding: 0 18px;
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-weight: 800; font-size: 15px;
    color: var(--text);
    letter-spacing: -0.01em;
    border-right: 1px solid var(--border);
    height: 100%; display: flex; align-items: center;
    white-space: nowrap; flex-shrink: 0;
  }
  #logo span { color: var(--accent); }

  .tb-group {
    display: flex; align-items: center;
    height: 100%;
    border-right: 1px solid var(--border);
    padding: 0 8px; gap: 3px;
    flex-shrink: 0;
  }

  .tb-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-muted); width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.15s;
    position: relative;
  }
  .tb-btn:hover {
    background: var(--bg); color: var(--text);
    box-shadow: var(--shadow-btn);
  }
  .tb-btn.active {
    background: var(--accent); color: #fff;
    box-shadow: 0 2px 6px rgba(59,130,246,0.35);
  }
  .tb-btn[title]:hover::after {
    content: attr(title);
    position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; font-size: 11px; padding: 4px 8px;
    border-radius: var(--radius-sm); white-space: nowrap; pointer-events: none;
    font-family: 'Inter', sans-serif; font-weight: 500;
    box-shadow: var(--shadow-sm);
  }

  .tb-sep { width: 1px; background: var(--border); height: 24px; margin: 0 4px; }

  #color-picker-wrap {
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    border-right: 1px solid var(--border); height: 100%;
    flex-shrink: 0;
  }
  #color-picker-wrap label {
    color: var(--text-muted); font-size: 10px; font-weight: 500;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  #stroke-color, #fill-color {
    width: 26px; height: 26px;
    border: 2px solid var(--border-strong);
    border-radius: 50%; cursor: pointer; padding: 0; background: none;
    box-shadow: var(--shadow-btn);
    transition: transform 0.1s;
  }
  #stroke-color:hover, #fill-color:hover { transform: scale(1.1); }
  #fill-toggle {
    background: white; border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text-muted); font-size: 10px; font-weight: 500;
    padding: 3px 8px; cursor: pointer;
    font-family: 'Inter', sans-serif;
    white-space: nowrap; transition: all 0.15s;
    box-shadow: var(--shadow-btn);
  }
  #fill-toggle.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; box-shadow: 0 2px 6px rgba(59,130,246,0.35);
  }

  /* Shape sub-tool picker */
  #shape-picker {
    display: none; align-items: center; gap: 3px;
    padding: 0 8px; border-right: 1px solid var(--border); height: 100%;
  }
  #shape-picker.visible { display: flex; }
  .shape-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-muted); width: 30px; height: 30px;
    border-radius: var(--radius-sm); display: flex; align-items: center;
    justify-content: center; font-size: 14px;
    transition: all 0.15s;
  }
  .shape-btn:hover { background: var(--bg); color: var(--text); box-shadow: var(--shadow-btn); }
  .shape-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 6px rgba(59,130,246,0.35); }

  #brush-size-wrap {
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    border-right: 1px solid var(--border); height: 100%;
    flex-shrink: 0;
  }
  #brush-size-wrap label {
    color: var(--text-muted); font-size: 10px; font-weight: 500;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  #brush-size { width: 80px; accent-color: var(--accent); cursor: pointer; }

  #toolbar-right {
    margin-left: auto; display: flex; align-items: center; gap: 6px; padding: 0 14px;
  }
  .tb-btn-text {
    background: white; border: 1px solid var(--border-strong); cursor: pointer;
    color: var(--text-muted); padding: 5px 12px; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s; white-space: nowrap;
    box-shadow: var(--shadow-btn);
  }
  .tb-btn-text:hover { background: var(--bg); color: var(--text); border-color: var(--accent); }
  .tb-btn-text.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 2px 8px rgba(59,130,246,0.4);
  }
  .tb-btn-text.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  /* ── WORKSPACE TABS ── */
  #tab-bar {
    position: fixed; top: 52px; left: 0; right: 0; height: 34px; /* total header: 86px */
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: stretch; z-index: 999;
    overflow-x: auto; overflow-y: hidden;
    scrollbar-width: none;
  }
  #tab-bar::-webkit-scrollbar { display: none; }

  .ws-tab {
    display: flex; align-items: center; gap: 6px;
    padding: 0 14px; min-width: 100px; max-width: 160px;
    background: transparent; border-right: 1px solid var(--border);
    cursor: pointer; font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 500;
    color: var(--text-muted); white-space: nowrap;
    flex-shrink: 0; position: relative;
    transition: background 0.12s, color 0.12s;
  }
  .ws-tab:hover { background: var(--bg); color: var(--text); }
  .ws-tab.active {
    background: var(--panel); color: var(--text);
    border-bottom: 2px solid var(--accent);
    margin-bottom: -1px;
    box-shadow:
      0 -2px 8px rgba(30,41,59,0.10),
      2px 0 6px rgba(30,41,59,0.06),
      -2px 0 6px rgba(30,41,59,0.06),
      0 -1px 0 var(--panel) inset;
  }
  .ws-tab-name {
    flex: 1; overflow: hidden; text-overflow: ellipsis;
    outline: none; background: none; border: none;
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
    color: inherit; cursor: pointer; pointer-events: none;
  }
  .ws-tab.active .ws-tab-name { pointer-events: all; cursor: text; }
  .ws-tab-close {
    background: none; border: none; color: var(--text-muted);
    font-size: 13px; cursor: pointer; padding: 0 3px;
    line-height: 1; border-radius: 4px; flex-shrink: 0;
    transition: all 0.12s;
  }
  .ws-tab-close:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
  #tab-add {
    background: none; border: none; color: var(--text-muted);
    font-size: 20px; padding: 0 14px; cursor: pointer;
    flex-shrink: 0; transition: color 0.12s;
    display: flex; align-items: center;
  }
  #tab-add:hover { color: var(--accent); }
  #tab-add:disabled { color: var(--border-strong); cursor: default; }

  /* ── CANVAS AREA ── */
  #canvas-container {
    position: fixed; top: 86px; left: 0; right: 0; bottom: 26px;
    overflow: scroll; cursor: default;
    background-color: var(--canvas-bg);
  }

  /* Scrollbar styling */
  #canvas-container::-webkit-scrollbar { width: 10px; height: 10px; }
  #canvas-container::-webkit-scrollbar-track { background: var(--bg); }
  #canvas-container::-webkit-scrollbar-thumb {
    background: var(--border-strong); border-radius: 8px;
    border: 2px solid var(--bg);
  }
  #canvas-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  #canvas-container::-webkit-scrollbar-corner { background: var(--bg); }

  /* Scroll wrapper sets the scrollable area size based on zoom */
  #scroll-wrapper {
    position: relative;
    width: 8000px; height: 8000px;
    transform-origin: 0 0;
  }

  #infinite-canvas {
    position: absolute; top: 0; left: 0;
    width: 8000px; height: 8000px;
  }

  /* Drawing canvas sits on top of everything in infinite space */
  #draw-canvas {
    position: absolute; top: 0; left: 0;
    width: 8000px; height: 8000px;
    pointer-events: none;
    z-index: 5;
  }
  #draw-canvas.drawing-mode { pointer-events: all; cursor: crosshair; }

  /* Screen-resolution overlay for low-latency live strokes */
  #stroke-overlay {
    position: fixed;
    top: 84px; left: 0;   /* sits over canvas-container, below toolbar+tabbar */
    pointer-events: none;
    z-index: 6;
  }
  #stroke-overlay.drawing-mode { pointer-events: all; cursor: crosshair; z-index: 999; }

  /* ── WAVEFORM ── */
  .waveform-block {
    position: absolute;
    background: var(--waveform-bg);
    border: 1px solid #2d3748;
    border-radius: var(--radius-lg);
    min-width: 300px; min-height: 60px; height: 90px;
    z-index: 50;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .waveform-block.locked { border-color: #3b82f6; }

  .waveform-header {
    height: 52px; background: #0f172a;
    display: flex; align-items: center; padding: 0 14px; gap: 10px;
    cursor: move; flex-shrink: 0;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .waveform-block.locked .waveform-header { cursor: default; }
  .waveform-title {
    font-size: 12px; color: #94a3b8; font-family: 'Inter', sans-serif;
    font-weight: 500;
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .waveform-ctrl {
    background: none; border: none; cursor: pointer;
    color: #64748b; font-size: 20px; padding: 4px 8px;
    border-radius: var(--radius-sm); line-height: 1;
    transition: all 0.12s;
  }
  .waveform-ctrl:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .waveform-ctrl.active { color: var(--accent2); }

  .waveform-vol-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 0 6px;
  }
  .waveform-vol-btn {
    background: none; border: none; cursor: pointer;
    color: #64748b; font-size: 20px; line-height: 1;
    padding: 4px 6px; border-radius: var(--radius-sm); transition: all 0.12s;
    flex-shrink: 0;
  }
  .waveform-vol-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .waveform-vol-btn.muted { color: #ef4444; }
  .waveform-vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 128px; height: 3px; border-radius: 8px;
    background: #334155; outline: none; cursor: pointer;
    accent-color: var(--accent);
  }
  .waveform-vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    border: 2px solid #0f172a;
    box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
  }
  .waveform-vol-slider::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid #0f172a;
  }

  .waveform-body {
    flex: 1; position: relative; overflow: hidden;
    cursor: col-resize;
  }
  /* Canvas fills the body exactly — width set by JS to match block */
  .waveform-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; display: block;
  }
  /* Playhead: absolute px position set by JS from currentTime × pxPerSec */
  .waveform-playhead {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--waveform-playhead);
    pointer-events: none; left: 0; z-index: 2;
    will-change: left;
  }
  /* Resize handles on left and right edges */
  .waveform-resize-l, .waveform-resize-r {
    position: absolute; top: 52px; bottom: 0; width: 12px;
    cursor: ew-resize; z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }
  .waveform-resize-l { left: 0; }
  .waveform-resize-r { right: 0; }
  .waveform-resize-l::after, .waveform-resize-r::after {
    content: '⋮'; color: #475569; font-size: 13px; pointer-events: none;
  }
  .waveform-resize-b {
    position: absolute; bottom: 0; left: 12px; right: 12px; height: 8px;
    cursor: ns-resize; z-index: 3;
  }
  .waveform-resize-b::after {
    content: ''; display: block; margin: 3px auto 0;
    width: 28px; height: 2px;
    border-radius: 4px; background: #334155;
  }

  /* ── STORYBOARD FRAMES ── */
  .sb-frame {
    position: absolute;
    background: var(--frame-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    min-width: 160px; min-height: 120px;
    box-shadow: var(--shadow);
    z-index: 40;
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .sb-frame:hover {
    z-index: 45;
    box-shadow: 0 8px 24px rgba(30,41,59,0.14);
  }

  .sb-frame-header {
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    height: 32px; display: flex; align-items: center;
    padding: 0 10px; gap: 6px; cursor: move; flex-shrink: 0;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .sb-frame-title {
    flex: 1; font-size: 11px; color: var(--text);
    font-family: 'Inter', sans-serif; font-weight: 600;
    background: none; border: none; outline: none;
    cursor: default; letter-spacing: 0em; min-width: 0;
    pointer-events: none;
  }
  .sb-frame-title.editing {
    cursor: text; pointer-events: all;
    background: white; border-radius: 4px;
    padding: 1px 5px; border: 1px solid var(--accent);
  }
  .sb-frame-title::placeholder { color: var(--text-muted); }
  .sb-frame-title:focus {
    background: white; border-radius: 4px;
    padding: 1px 5px; border: 1px solid var(--accent);
  }
  .sb-frame-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 12px; padding: 2px 4px;
    line-height: 1; transition: all 0.12s; border-radius: 4px;
  }
  .sb-frame-btn:hover { background: var(--bg); color: var(--text); }
  .sb-frame-btn.del:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

  .sb-frame-body {
    flex: 1; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* Tab bar inside frame */
  .sb-frame-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0;
  }
  .sb-tab {
    font-size: 10px; padding: 5px 12px; cursor: pointer;
    border: none; background: none;
    font-family: 'Inter', sans-serif; font-weight: 500;
    color: var(--text-muted); border-right: 1px solid var(--border);
    transition: all 0.12s;
  }
  .sb-tab.active {
    background: var(--frame-bg); color: var(--accent);
    border-bottom: 2px solid var(--accent); margin-bottom: -1px;
  }

  .sb-frame-content { flex: 1; position: relative; overflow: hidden; }

  /* Text tab */
  .sb-text-area {
    width: 100%; height: 100%; border: none; outline: none; resize: none;
    background: transparent; font-family: 'Inter', sans-serif;
    font-size: 12px; color: var(--text); padding: 10px 12px;
    line-height: 1.7;
  }

  /* Draw tab */
  .sb-draw-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    cursor: crosshair; touch-action: none;
  }

  /* Image tab */
  .sb-image-area {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; padding: 12px;
  }
  .sb-image-area img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--radius-sm); }
  .sb-media-video {
    max-width: 100%; max-height: 100%; display: block;
    background: #000; border-radius: var(--radius-sm);
  }
  .sb-media-iframe {
    width: 100%; height: 100%; border: none; display: block;
    min-height: 160px;
  }
  .sb-media-chooser {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; padding: 16px;
  }
  .sb-media-wrap {
    position: relative; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .sb-media-swap {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(255,255,255,0.92); color: var(--text-muted);
    border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 500;
    padding: 4px 10px; cursor: pointer; z-index: 10;
    opacity: 0; transition: opacity 0.15s;
    pointer-events: none; box-shadow: var(--shadow-sm);
  }
  .sb-media-wrap:hover .sb-media-swap {
    opacity: 1; pointer-events: all;
  }
  .sb-img-placeholder {
    color: var(--text-muted); font-size: 12px; text-align: center;
    pointer-events: none; font-family: 'Inter', sans-serif;
  }
  .sb-img-upload {
    font-size: 11px; font-weight: 500;
    padding: 6px 14px; border: 1px solid var(--border-strong);
    background: white; border-radius: var(--radius-sm); cursor: pointer;
    font-family: 'Inter', sans-serif; color: var(--text-muted);
    box-shadow: var(--shadow-btn); transition: all 0.12s;
  }
  .sb-img-upload:hover { background: var(--bg); color: var(--text); border-color: var(--accent); }

  /* Resize handle (bottom-right) */
  .sb-resize {
    position: absolute; bottom: 0; right: 0;
    width: 18px; height: 18px; cursor: se-resize;
    z-index: 2;
  }
  .sb-resize::after {
    content: '';
    position: absolute; bottom: 4px; right: 4px;
    width: 7px; height: 7px;
    border-right: 2px solid var(--border-strong);
    border-bottom: 2px solid var(--border-strong);
    border-radius: 1px;
  }

  /* ── CANVAS IMAGES ── */
  .canvas-image {
    position: absolute; cursor: move; z-index: 30;
    border: 2px solid transparent;
    border-radius: var(--radius-sm);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .canvas-image:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .canvas-image img { display: block; max-width: 400px; max-height: 400px; }
  .canvas-image .img-del {
    position: absolute; top: -10px; right: -10px;
    background: var(--accent); color: #fff; border: none;
    width: 20px; height: 20px; border-radius: 50%;
    font-size: 12px; cursor: pointer; display: none;
    align-items: center; justify-content: center; line-height: 1;
  }
  .canvas-image:hover .img-del { display: flex; }

  /* ── CANVAS TEXT LABELS ── */
  .canvas-label {
    position: absolute; z-index: 35; cursor: move;
    min-width: 80px; min-height: 24px;
  }
  .canvas-label-input {
    background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
    color: var(--text); width: 100%;
    cursor: text;
  }
  .canvas-label:hover .canvas-label-input { background: rgba(255,255,255,0.5); border-radius: 2px; }
  .canvas-label .lbl-del {
    position: absolute; top: -8px; right: -8px;
    background: var(--accent); color: #fff; border: none;
    width: 16px; height: 16px; border-radius: 50%;
    font-size: 10px; cursor: pointer; display: none;
    align-items: center; justify-content: center;
  }
  .canvas-label:hover .lbl-del { display: flex; }

  /* ── STATUS BAR ── */
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 26px;
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 14px; gap: 20px;
    z-index: 1000;
    box-shadow: 0 -1px 4px rgba(30,41,59,0.04);
  }
  .status-item { font-size: 10px; color: var(--text-muted); font-family: 'Inter', sans-serif; font-weight: 500; }
  .status-item span { color: var(--text); }
  #status-zoom.at-min { color: var(--accent); }
  #status-zoom.at-min::after { content: ' MIN'; font-size: 9px; opacity: 0.8; }

  /* ── HIDDEN INPUTS ── */
  #audio-input, #image-input, #project-input { display: none; }

  /* ── MODALS / OVERLAYS ── */
  .drop-overlay {
    position: fixed; inset: 86px 0 26px 0;
    background: rgba(59,130,246,0.06);
    border: 2px dashed var(--accent);
    border-radius: var(--radius-lg);
    margin: 12px;
    z-index: 2000; display: none;
    align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 20px; font-weight: 600;
    color: var(--accent); pointer-events: none;
  }
  .drop-overlay.visible { display: flex; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  /* file:// protocol notice */
  #file-notice {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--text); border: 1px solid #334155;
    color: #e2e8f0; font-size: 11px; font-family: 'Inter', sans-serif;
    font-weight: 500;
    padding: 8px 16px; border-radius: var(--radius); z-index: 2000;
    display: none; gap: 12px; align-items: center; white-space: nowrap;
    box-shadow: var(--shadow);
  }
  #file-notice.visible { display: flex; }
  #file-notice-close {
    background: none; border: none; color: #94a3b8; cursor: pointer;
    font-size: 14px; padding: 0 0 0 4px; line-height: 1;
    transition: color 0.12s;
  }
  #file-notice-close:hover { color: #fff; }
</style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
// Canvas constants — declared early so all functions can reference them
const CANVAS_SIZE = 8000;
const PAN_MARGIN  = 100; // minimum px of canvas visible at each edge (screen-space)

const state = {
  tool: 'select',      // select | draw | erase | text
  zoom: 1,
  strokeColor: '#1a1814',
  brushSize: 3,
  isDrawing: false,
  drawPoints: [],
  frameCount: 0,
  waveformCount: 0,
  labelCount: 0,
  imageCount: 0,
};

// Canvas transform
const container = document.getElementById('canvas-container');
const infiniteCanvas = document.getElementById('infinite-canvas');
const drawCanvas = document.getElementById('draw-canvas');
const ctx = drawCanvas.getContext('2d');
drawCanvas.width = 8000;
drawCanvas.height = 8000;

// ═══════════════════════════════════════════════════════════
// TRANSFORM
// ═══════════════════════════════════════════════════════════
// Transform cache — keeps drawing overlay coords in sync without layout reflow
let _tx = 0, _ty = 0, _tz = 1;

// Calculate the minimum zoom so the canvas always fills the viewport.
// Canvas is CANVAS_SIZE px; viewport excludes toolbar + statusbar.
function getMinZoom() {
  const vw = window.innerWidth;
  const vh = window.innerHeight - 86 - 26; // toolbar+tabbar + statusbar
  // Canvas must always be at least as large as the viewport so you
  // can't pan into blank space. Also enforce a 25% floor for usability.
  const fitZoom = Math.max(vw / CANVAS_SIZE, vh / CANVAS_SIZE);
  return Math.max(fitZoom, 0.25);
}

const scrollWrapper = document.getElementById('scroll-wrapper');

function applyTransform() {
  // Zoom scales the scroll-wrapper so scrollable area grows/shrinks with zoom
  scrollWrapper.style.transform = `scale(${state.zoom})`;
  scrollWrapper.style.width  = CANVAS_SIZE + 'px';
  scrollWrapper.style.height = CANVAS_SIZE + 'px';
  // Tell container how big the scaled content actually is
  // (browser needs explicit size for scrollbars to work correctly)
  const scaledSize = CANVAS_SIZE * state.zoom;
  scrollWrapper.style.marginRight  = Math.max(0, scaledSize - CANVAS_SIZE) + 'px';
  scrollWrapper.style.marginBottom = Math.max(0, scaledSize - CANVAS_SIZE) + 'px';

  const pct = Math.round(state.zoom * 100);
  const minPct = Math.round(getMinZoom() * 100);
  const zoomEl = document.getElementById('status-zoom');
  zoomEl.textContent = pct + '%';
  zoomEl.classList.toggle('at-min', pct <= minPct + 2);
  // Update transform cache for drawing coordinate conversion
  _tx = -container.scrollLeft / state.zoom;
  _ty = -container.scrollTop  / state.zoom;
  _tz = state.zoom;
}
applyTransform();

// Client coords → canvas coords (accounts for scroll position and zoom)
function toCanvas(cx, cy) {
  return {
    x: (cx + container.scrollLeft) / state.zoom,
    y: (cy - 52 + container.scrollTop) / state.zoom,
  };
}

// ═══════════════════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════════════════
const toolBtns = {
  select: document.getElementById('tool-select'),
  draw:   document.getElementById('tool-draw'),
  erase:  document.getElementById('tool-erase'),
  shape:  document.getElementById('tool-shape'),
  text:   document.getElementById('tool-text'),
};

let activeShape = 'rect'; // rect | circle | arrow

function setTool(t) {
  state.tool = t;
  Object.values(toolBtns).forEach(b => b.classList.remove('active'));
  toolBtns[t].classList.add('active');
  document.getElementById('status-tool').textContent = t.toUpperCase();
  const dc = document.getElementById('draw-canvas');
  dc.classList.toggle('drawing-mode', t === 'draw' || t === 'erase');
  // Show/hide shape sub-picker
  document.getElementById('shape-picker').classList.toggle('visible', t === 'shape');
  // Overlay is activated per-stroke via overlayActivate/Deactivate.
  // When switching tools, always make sure it's deactivated.
  if (typeof overlayDeactivate === 'function') overlayDeactivate();
  // Clear overlay when switching tools
  if (typeof octx !== 'undefined') {
    octx.clearRect(0, 0, overlay.width, overlay.height);
  }
  container.style.cursor = t === 'select' ? 'default' : t === 'text' ? 'text' : 'crosshair';
}

Object.entries(toolBtns).forEach(([t, btn]) => btn.addEventListener('click', () => setTool(t)));

document.getElementById('stroke-color').addEventListener('input', e => { state.strokeColor = e.target.value; });
document.getElementById('brush-size').addEventListener('input', e => { state.brushSize = +e.target.value; });

// Fill colour and toggle
state.fillColor   = '#ffffff';
state.fillEnabled = false;
document.getElementById('fill-color').addEventListener('input', e => { state.fillColor = e.target.value; });
document.getElementById('fill-toggle').addEventListener('click', () => {
  state.fillEnabled = !state.fillEnabled;
  document.getElementById('fill-toggle').classList.toggle('active', state.fillEnabled);
});

// Shape sub-picker
['rect','circle','arrow'].forEach(s => {
  document.getElementById('shape-' + s).addEventListener('click', () => {
    activeShape = s;
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('shape-' + s).classList.add('active');
  });
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'v' || e.key === 'V') setTool('select');
  if (e.key === 'd' || e.key === 'D') setTool('draw');
  if (e.key === 'e' || e.key === 'E') setTool('erase');
  if (e.key === 's' || e.key === 'S') setTool('shape');
  if (e.key === 't' || e.key === 'T') setTool('text');
  if (e.key === 'f' || e.key === 'F') addFrame();
  if (e.key === 'a' || e.key === 'A') document.getElementById('audio-input').click();
  if (e.key === 'i' || e.key === 'I') document.getElementById('image-input').click();
});

// ═══════════════════════════════════════════════════════════
// CANVAS PANNING (Middle Mouse)
// ═══════════════════════════════════════════════════════════
// Panning is now handled natively by the browser scrollbars.
// We just sync the transform cache whenever the container scrolls.
container.addEventListener('scroll', () => {
  _tx = -container.scrollLeft / state.zoom;
  _ty = -container.scrollTop  / state.zoom;
});

container.addEventListener('mousedown', e => {
  if (e.button === 0 && state.tool === 'text') {
    if (e.target.closest('#tab-bar')) return;
    const pos = toCanvas(e.clientX, e.clientY);
    addLabel(pos.x, pos.y);
    setTool('select');
  }
});

window.addEventListener('mousemove', e => {
  const pos = toCanvas(e.clientX, e.clientY);
  document.getElementById('status-pos').textContent = `${Math.round(pos.x)}, ${Math.round(pos.y)}`;
});

// Scroll wheel zooms toward the mouse cursor position
container.addEventListener('wheel', e => {
  if (!e.ctrlKey && e.deltaX === 0) {
    // Plain scroll — let browser handle it natively (scrolls the container)
    return;
  }
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(getMinZoom(), Math.min(4, state.zoom * delta));
  if (newZoom === state.zoom) return;

  // Keep the canvas point under the mouse cursor stationary while zooming
  // mouseCanvasX = (clientX + scrollLeft) / oldZoom
  // After zoom: newScrollLeft = mouseCanvasX * newZoom - clientX
  const mouseCanvasX = (e.clientX + container.scrollLeft) / state.zoom;
  const mouseCanvasY = (e.clientY - 52 + container.scrollTop) / state.zoom;
  state.zoom = newZoom;
  applyTransform();
  container.scrollLeft = mouseCanvasX * newZoom - e.clientX;
  container.scrollTop  = mouseCanvasY * newZoom - (e.clientY - 52);
  // Re-sync cache after scroll adjustment
  _tx = -container.scrollLeft / state.zoom;
  _ty = -container.scrollTop  / state.zoom;
}, { passive: false });

container.addEventListener('contextmenu', e => e.preventDefault());

// ═══════════════════════════════════════════════════════════
// FREEHAND DRAWING — overlay + stroke-history system
//
// Architecture:
//   overlay canvas  : screen-res, live stroke preview (fast, no offset issues)
//   drawCanvas      : 8000×8000, final raster of all committed strokes
//   strokeHistory[] : vector record of every stroke for move/undo support
//
// Coordinate spaces:
//   screen  : raw clientX/Y from pointer events (what the overlay uses)
//   canvas  : infinite-canvas space = (screen - pan) / zoom
//             This is what gets stored in strokeHistory and drawn to drawCanvas.
//
// The drop-on-commit bug was caused by the overlay being position:fixed
// starting at y=0 but the toolbar consuming 52px — so screen→canvas was
// offset by the toolbar height. Fix: use toCanvas() (pan/zoom math) for
// all canvas-space coordinates instead of getBoundingClientRect().
// ═══════════════════════════════════════════════════════════

const TOOLBAR_H = 86; // toolbar (52px) + tab bar (34px)

const overlay = document.getElementById('stroke-overlay');
const octx    = overlay.getContext('2d');

function resizeOverlay() {
  overlay.width  = window.innerWidth;
  overlay.height = window.innerHeight - 86 - 26;
}
resizeOverlay();
window.addEventListener('resize', () => {
  resizeOverlay();
  const minZ = getMinZoom();
  if (state.zoom < minZ) state.zoom = minZ;
  applyTransform();
});

// Sync cache helper (variables declared above near applyTransform)
function invalidateTransformCache() {
  _tx = -container.scrollLeft / state.zoom;
  _ty = -container.scrollTop  / state.zoom;
  _tz = state.zoom;
}
invalidateTransformCache();

// Screen coords → canvas coords  (uses cached pan/zoom — no reflow)
// clientY from the overlay (position:fixed, top:0) must subtract the
// canvas-container top offset (TOOLBAR_H) so Y lines up with canvas space.
function screenToCanvas(sx, sy) {
  return {
    x: (sx + container.scrollLeft) / state.zoom,
    y: (sy - TOOLBAR_H + container.scrollTop) / state.zoom,
  };
}

// Canvas coords → screen coords (inverse)
function canvasToScreen(cx, cy) {
  return {
    x: cx * state.zoom - container.scrollLeft,
    y: cy * state.zoom - container.scrollTop + TOOLBAR_H,
  };
}

// ── Stroke history ──────────────────────────────────────────
// Each entry: { points:[{x,y,w}…], color, isErase, offsetX, offsetY }
// offsetX/Y are applied at render time so we can move strokes cheaply.
let strokeHistory = [];

// Redraw all committed strokes onto drawCanvas from vector data
function redrawAllStrokes() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  for (const s of strokeHistory) {
    drawStrokeToCtx(ctx, s);
  }
}

function drawStrokeToCtx(targetCtx, s) {
  targetCtx.save();
  targetCtx.globalCompositeOperation = 'source-over';
  const ox = s.offsetX || 0, oy = s.offsetY || 0;

  if (s.type === 'rect' || s.type === 'circle' || s.type === 'arrow') {
    // ── Shape rendering ──
    const x1 = s.x1 + ox, y1 = s.y1 + oy;
    const x2 = s.x2 + ox, y2 = s.y2 + oy;
    targetCtx.strokeStyle = s.color;
    targetCtx.lineWidth   = s.strokeWidth || 2;
    targetCtx.lineCap     = 'round';
    targetCtx.lineJoin    = 'round';

    if (s.type === 'rect') {
      if (s.fillEnabled) {
        targetCtx.fillStyle = s.fillColor || '#ffffff';
        targetCtx.fillRect(x1, y1, x2 - x1, y2 - y1);
      }
      targetCtx.strokeRect(x1, y1, x2 - x1, y2 - y1);

    } else if (s.type === 'circle') {
      const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
      const rx = Math.abs(x2 - x1) / 2, ry = Math.abs(y2 - y1) / 2;
      targetCtx.beginPath();
      targetCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      if (s.fillEnabled) { targetCtx.fillStyle = s.fillColor || '#ffffff'; targetCtx.fill(); }
      targetCtx.stroke();

    } else if (s.type === 'arrow') {
      const dx = x2 - x1, dy = y2 - y1;
      const angle = Math.atan2(dy, dx);
      const len   = Math.sqrt(dx*dx + dy*dy);
      const headLen = Math.min(30, len * 0.35);
      // Shaft
      targetCtx.beginPath();
      targetCtx.moveTo(x1, y1);
      targetCtx.lineTo(x2, y2);
      targetCtx.stroke();
      // Arrowhead
      targetCtx.beginPath();
      targetCtx.moveTo(x2, y2);
      targetCtx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/6), y2 - headLen * Math.sin(angle - Math.PI/6));
      targetCtx.moveTo(x2, y2);
      targetCtx.lineTo(x2 - headLen * Math.cos(angle + Math.PI/6), y2 - headLen * Math.sin(angle + Math.PI/6));
      targetCtx.stroke();
    }

  } else {
    // ── Freehand stroke rendering ──
    if (s.points.length < 2) { targetCtx.restore(); return; }
    targetCtx.globalCompositeOperation = s.isErase ? 'destination-out' : 'source-over';
    targetCtx.lineCap  = 'round';
    targetCtx.lineJoin = 'round';
    targetCtx.strokeStyle = s.color;
    targetCtx.beginPath();
    targetCtx.moveTo(s.points[0].x + ox, s.points[0].y + oy);
    for (let i = 1; i < s.points.length; i++) {
      const pa = s.points[i-1], pb = s.points[i];
      const mx = (pa.x + pb.x) / 2 + ox, my = (pa.y + pb.y) / 2 + oy;
      targetCtx.lineWidth = pb.w;
      targetCtx.quadraticCurveTo(pa.x + ox, pa.y + oy, mx, my);
    }
    targetCtx.lineTo(s.points[s.points.length-1].x + ox, s.points[s.points.length-1].y + oy);
    targetCtx.stroke();
  }

  targetCtx.restore();
}

// ── Live drawing directly onto drawCanvas in canvas-space ──────
// Drawing in canvas-space (not screen-space) means strokes are never
// clipped at screen edges, regardless of zoom level or pan position.

// ── Drawing engine ───────────────────────────────────────────
// Live strokes render on the screen-res overlay (smooth, no flicker).
// On commit the stroke is converted to canvas-space, added to history,
// and drawn onto drawCanvas. The overlay is then cleared.
//
// activePoints: screen-space { sx, sy, w, color } collected during stroke.
let activePoints = [];
let activeIsErase = false;

// Render the complete in-progress stroke onto the overlay each frame.
// Repainting the whole path (not just the latest segment) gives smooth curves
// because quadratic Bézier needs all prior points to look right.
function renderOverlayStroke() {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  if (activePoints.length < 2) return;
  // Overlay is position:absolute inside canvas-container (top:52px in viewport).
  // clientY is viewport-relative, so subtract TOOLBAR_H to get overlay-relative y.
  const oy = TOOLBAR_H;
  octx.save();
  octx.lineCap  = 'round';
  octx.lineJoin = 'round';
  octx.beginPath();
  octx.moveTo(activePoints[0].sx, activePoints[0].sy - oy);
  for (let i = 1; i < activePoints.length; i++) {
    const pa = activePoints[i - 1], pb = activePoints[i];
    const mx = (pa.sx + pb.sx) / 2;
    const my = (pa.sy + pb.sy) / 2 - oy;
    octx.lineWidth   = pb.w;
    octx.strokeStyle = pb.color;
    octx.quadraticCurveTo(pa.sx, pa.sy - oy, mx, my);
  }
  const last = activePoints[activePoints.length - 1];
  octx.lineTo(last.sx, last.sy - oy);
  octx.lineWidth   = last.w;
  octx.strokeStyle = last.color;
  octx.stroke();
  octx.restore();
}

let rafPending = false;
function scheduleOverlayRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; renderOverlayStroke(); });
}

// Commit: convert screen-space points → canvas-space, store in history,
// paint onto drawCanvas incrementally (no full redraw needed), clear overlay.
function commitStroke(isErase) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  if (activePoints.length < 2) { activePoints = []; return; }
  const canvasPoints = activePoints.map(p => {
    const c = screenToCanvas(p.sx, p.sy);
    return { x: c.x, y: c.y, w: p.w / _tz };
  });
  const stroke = { points: canvasPoints, color: activePoints[0].color, isErase, offsetX: 0, offsetY: 0 };
  strokeHistory.push(stroke);
  if (isErase) {
    // Erase strokes must be fully composited via a complete redraw so the
    // canvas accurately reflects the erased state. Incremental paint won't
    // correctly remove overlapping strokes drawn after the erase region.
    redrawAllStrokes();
  } else {
    drawStrokeToCtx(ctx, stroke); // incremental — fast for non-erase strokes
  }
  activePoints = [];
}

// ── Overlay activate / deactivate ────────────────────────────
// Overlay is only hot (pointer-events:all, high z-index) during an active stroke.
// Between strokes it's invisible to clicks so frames remain accessible.
function overlayActivate() {
  overlay.style.pointerEvents = 'all';
  overlay.style.cursor = 'crosshair';
  overlay.style.zIndex = '999';
}
function overlayDeactivate() {
  overlay.style.pointerEvents = 'none';
  overlay.style.cursor = '';
  overlay.style.zIndex = '6';
}

// ── Shape drawing state ──────────────────────────────────────
let shapeStart = null; // { sx, sy } screen coords where drag started

function renderShapePreview(sx1, sy1, sx2, sy2) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  const oy = TOOLBAR_H;
  octx.save();
  octx.strokeStyle = state.strokeColor;
  octx.lineWidth   = state.brushSize * 2;
  octx.lineCap     = 'round';
  octx.lineJoin    = 'round';
  octx.setLineDash([6, 4]);
  const x1 = sx1, y1 = sy1 - oy, x2 = sx2, y2 = sy2 - oy;

  if (activeShape === 'rect') {
    if (state.fillEnabled) {
      octx.fillStyle = state.fillColor + '88'; // semi-transparent preview
      octx.fillRect(x1, y1, x2-x1, y2-y1);
    }
    octx.strokeRect(x1, y1, x2-x1, y2-y1);

  } else if (activeShape === 'circle') {
    const cx = (x1+x2)/2, cy = (y1+y2)/2;
    const rx = Math.abs(x2-x1)/2, ry = Math.abs(y2-y1)/2;
    octx.beginPath();
    octx.ellipse(cx, cy, Math.max(1,rx), Math.max(1,ry), 0, 0, Math.PI*2);
    if (state.fillEnabled) { octx.fillStyle = state.fillColor + '88'; octx.fill(); }
    octx.stroke();

  } else if (activeShape === 'arrow') {
    const dx = x2-x1, dy = y2-y1;
    const angle = Math.atan2(dy, dx);
    const len = Math.sqrt(dx*dx+dy*dy);
    const headLen = Math.min(30, len*0.35);
    octx.beginPath();
    octx.moveTo(x1, y1); octx.lineTo(x2, y2); octx.stroke();
    octx.setLineDash([]);
    octx.beginPath();
    octx.moveTo(x2, y2);
    octx.lineTo(x2 - headLen*Math.cos(angle-Math.PI/6), y2 - headLen*Math.sin(angle-Math.PI/6));
    octx.moveTo(x2, y2);
    octx.lineTo(x2 - headLen*Math.cos(angle+Math.PI/6), y2 - headLen*Math.sin(angle+Math.PI/6));
    octx.stroke();
  }
  octx.restore();
}

function commitShape(sx1, sy1, sx2, sy2) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  const c1 = screenToCanvas(sx1, sy1);
  const c2 = screenToCanvas(sx2, sy2);
  const shape = {
    type: activeShape,
    x1: c1.x, y1: c1.y, x2: c2.x, y2: c2.y,
    color: state.strokeColor,
    fillColor: state.fillColor,
    fillEnabled: state.fillEnabled,
    strokeWidth: Math.max(1, state.brushSize * 2 / state.zoom),
    offsetX: 0, offsetY: 0,
    points: [{ x: c1.x, y: c1.y, w: 1 }, { x: c2.x, y: c2.y, w: 1 }], // for hit-test bbox
  };
  strokeHistory.push(shape);
  drawStrokeToCtx(ctx, shape);
}

// ── Pointer events ───────────────────────────────────────────
window.addEventListener('pointerdown', e => {
  if (state.tool !== 'draw' && state.tool !== 'erase' && state.tool !== 'shape') return;
  if (e.button === 1) return;
  if (e.button !== 0 && e.pointerType === 'mouse') return;
  if (e.target.closest('.sb-frame, .waveform-block, #toolbar, #tab-bar')) return;

  if (state.tool === 'shape') {
    overlayActivate();
    overlay.setPointerCapture(e.pointerId);
    state.isDrawing = true;
    shapeStart = { sx: e.clientX, sy: e.clientY };
    return;
  }

  activeIsErase = state.tool === 'erase';
  overlayActivate();
  overlay.setPointerCapture(e.pointerId);
  state.isDrawing = true;
  activePoints = [];
  const pressure = e.pressure > 0 ? e.pressure : 0.5;
  const w = activeIsErase ? state.brushSize * 6 : Math.max(1, state.brushSize * pressure * 2);
  activePoints.push({ sx: e.clientX, sy: e.clientY, w, color: state.strokeColor });
}, { capture: true });

overlay.addEventListener('pointermove', e => {
  if (!state.isDrawing) return;
  if (state.tool === 'shape' && shapeStart) {
    renderShapePreview(shapeStart.sx, shapeStart.sy, e.clientX, e.clientY);
    return;
  }
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ev of events) {
    const pressure = ev.pressure > 0 ? ev.pressure : 0.5;
    const w = activeIsErase ? state.brushSize * 6 : Math.max(1, state.brushSize * pressure * 2);
    activePoints.push({ sx: ev.clientX, sy: ev.clientY, w, color: state.strokeColor });
  }
  scheduleOverlayRender();
});

function finishStroke(e) {
  if (!state.isDrawing) return;
  state.isDrawing = false;
  if (state.tool === 'shape' && shapeStart) {
    commitShape(shapeStart.sx, shapeStart.sy, e.clientX, e.clientY);
    shapeStart = null;
    overlayDeactivate();
    return;
  }
  commitStroke(activeIsErase);
  overlayDeactivate();
}

overlay.addEventListener('pointerup',     finishStroke);
overlay.addEventListener('pointercancel', finishStroke);

// Strokes and shapes are permanent once drawn — select mode only applies
// to DOM elements (frames, images, labels). No stroke drag/selection needed.

document.getElementById('btn-clear-draw').addEventListener('click', () => {
  strokeHistory = [];
  selectedStroke = null;
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  octx.clearRect(0, 0, overlay.width, overlay.height);
});

// ═══════════════════════════════════════════════════════════
// DRAGGING UTILITY
// ═══════════════════════════════════════════════════════════
function makeDraggable(el, handleEl, onDrag) {
  let startX, startY, startL, startT, dragging = false;
  handleEl.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation(); e.preventDefault();
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startL = parseInt(el.style.left) || 0;
    startT = parseInt(el.style.top) || 0;
    const onMove = ev => {
      if (!dragging) return;
      const dx = (ev.clientX - startX) / state.zoom;
      const dy = (ev.clientY - startY) / state.zoom;
      el.style.left = (startL + dx) + 'px';
      el.style.top  = (startT + dy) + 'px';
      if (onDrag) onDrag();
    };
    const onUp = () => { dragging = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

function makeResizable(el, onResize) {
  const handle = el.querySelector('.sb-resize');
  if (!handle) return;
  handle.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const startW = el.offsetWidth, startH = el.offsetHeight;
    const onMove = ev => {
      const dw = (ev.clientX - startX) / state.zoom;
      const dh = (ev.clientY - startY) / state.zoom;
      el.style.width  = Math.max(160, startW + dw) + 'px';
      el.style.height = Math.max(120, startH + dh) + 'px';
      if (onResize) onResize();
    };
    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

// ═══════════════════════════════════════════════════════════
// STORYBOARD FRAMES
// ═══════════════════════════════════════════════════════════
function addFrame(opts) {
  state.frameCount++;
  const id = 'frame-' + Date.now();
  // Default placement: near the current viewport centre in canvas space,
  // with a small random offset so multiple frames don't stack exactly.
  const viewCX = (container.scrollLeft + window.innerWidth  / 2) / state.zoom;
  const viewCY = (container.scrollTop  + (window.innerHeight - TOOLBAR_H - 26) / 2) / state.zoom;
  const x = opts?.x ?? (viewCX - 140 + (Math.random() * 80 - 40));
  const y = opts?.y ?? (viewCY - 100 + (Math.random() * 80 - 40));
  const w = opts?.w ?? 280;
  const h = opts?.h ?? 200;
  const title = opts?.title ?? `Frame ${state.frameCount}`;
  const activeTab = opts?.activeTab ?? 'draw';
  const textContent = opts?.textContent ?? '';
  const imgSrc = opts?.imgSrc ?? null;

  const frame = document.createElement('div');
  frame.className = 'sb-frame';
  frame.id = id;
  frame.style.left = x + 'px';
  frame.style.top  = y + 'px';
  frame.style.width  = w + 'px';
  frame.style.height = h + 'px';

  frame.innerHTML = `
    <div class="sb-frame-header">
      <input class="sb-frame-title" value="${title}" placeholder="Label…" readonly title="Right-click to rename">
      <button class="sb-frame-btn del" title="Delete">✕</button>
    </div>
    <div class="sb-frame-body">
      <div class="sb-frame-tabs">
        <button class="sb-tab ${activeTab==='draw'?'active':''}" data-tab="draw">DRAW</button>
        <button class="sb-tab ${activeTab==='text'?'active':''}" data-tab="text">TEXT</button>
        <button class="sb-tab ${activeTab==='image'?'active':''}" data-tab="image">MEDIA</button>
      </div>
      <div class="sb-frame-content">
        <div class="sb-pane" data-pane="draw" style="display:${activeTab==='draw'?'block':'none'};width:100%;height:100%;position:absolute;">
          <canvas class="sb-draw-canvas"></canvas>
        </div>
        <div class="sb-pane" data-pane="text" style="display:${activeTab==='text'?'flex':'none'};width:100%;height:100%;position:absolute;">
          <textarea class="sb-text-area" placeholder="Notes, descriptions, directions…">${textContent}</textarea>
        </div>
        <div class="sb-pane" data-pane="image" style="display:${activeTab==='image'?'flex':'none'};width:100%;height:100%;position:absolute;">
          <div class="sb-image-area" id="media-area-${id}">
          </div>
        </div>
      </div>
    </div>
    <div class="sb-resize"></div>
  `;

  infiniteCanvas.appendChild(frame);

  // Tabs
  frame.querySelectorAll('.sb-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      frame.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      frame.querySelectorAll('.sb-pane').forEach(p => p.style.display = 'none');
      const pane = frame.querySelector(`[data-pane="${tab.dataset.tab}"]`);
      pane.style.display = tab.dataset.tab === 'text' ? 'flex' : 'block';
      if (tab.dataset.tab === 'draw') resizeSbCanvas(frame);
    });
  });

  // Delete
  frame.querySelector('.sb-frame-btn.del').addEventListener('click', () => frame.remove());

  // Right-click on header → edit title
  const titleInput = frame.querySelector('.sb-frame-title');
  frame.querySelector('.sb-frame-header').addEventListener('contextmenu', e => {
    e.preventDefault();
    titleInput.removeAttribute('readonly');
    titleInput.classList.add('editing');
    titleInput.focus();
    titleInput.select();
  });
  titleInput.addEventListener('blur', () => {
    titleInput.setAttribute('readonly', '');
    titleInput.classList.remove('editing');
  });
  titleInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { titleInput.blur(); }
  });

  // Media chooser inside frame
  const mediaArea = frame.querySelector(`#media-area-${id}`);

  function showChooser() {
    mediaArea.innerHTML = `<div class="sb-media-chooser">
      <div class="sb-img-placeholder">&#127916; No media</div>
      <button class="sb-img-upload" data-action="image">&#128444; Image</button>
      <button class="sb-img-upload" data-action="video">&#127916; Video file</button>
      <button class="sb-img-upload" data-action="youtube">&#9654; YouTube link</button>
    </div>`;
    attachMediaChooser();
  }

  function setMediaContent(html) {
    // Wrap media in a container so the swap button can sit on top
    mediaArea.innerHTML = `<div class="sb-media-wrap">
      ${html}
      <button class="sb-media-swap" title="Change media">&#8635; swap</button>
    </div>`;
    // Swap button returns to chooser
    mediaArea.querySelector('.sb-media-swap').addEventListener('click', e => {
      e.stopPropagation();
      showChooser();
    });
  }

  function attachMediaChooser() {
    mediaArea.querySelectorAll('.sb-img-upload').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const action = btn.dataset.action;
        if (action === 'image') {
          const inp = document.createElement('input');
          inp.type = 'file'; inp.accept = 'image/*,.tiff,.tif';
          inp.onchange = () => {
            const file = inp.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => setMediaContent(`<img src="${ev.target.result}" alt="" style="max-width:100%;max-height:100%;object-fit:contain;">`);
            reader.readAsDataURL(file);
          };
          inp.click();
        } else if (action === 'video') {
          const inp = document.createElement('input');
          inp.type = 'file'; inp.accept = 'video/mp4,video/webm,video/quicktime,.mp4,.webm,.mov';
          inp.onchange = () => {
            const file = inp.files[0]; if (!file) return;
            const url = URL.createObjectURL(file);
            setMediaContent(`<video class="sb-media-video" src="${url}" controls style="max-width:100%;max-height:100%;"></video>`);
          };
          inp.click();
        } else if (action === 'youtube') {
          const raw = prompt('Paste a YouTube URL or video ID:');
          if (!raw) return;
          // Extract video ID from various YouTube URL formats
          let vid = raw.trim();
          const m = vid.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
          if (m) vid = m[1];
          if (vid.length !== 11) { alert('Could not find a valid YouTube video ID in that URL.'); return; }
          setMediaContent(`<iframe class="sb-media-iframe" src="https://www.youtube.com/embed/${vid}?rel=0" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" style="width:100%;height:100%;min-height:160px;border:none;"></iframe>`);
        }
      });
    });
  }

  // Initialise media pane — restore saved media or show chooser
  if (opts && opts.imgSrc) {
    const src = opts.imgSrc;
    if (src.startsWith('yt:')) {
      setMediaContent(`<iframe class="sb-media-iframe" src="https://www.youtube.com/embed/${src.slice(3)}?rel=0" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" style="width:100%;height:100%;min-height:160px;border:none;"></iframe>`);
    } else if (src.startsWith('data:video') || src.match(/\.(mp4|webm|mov)/i)) {
      setMediaContent(`<video class="sb-media-video" src="${src}" controls style="max-width:100%;max-height:100%;"></video>`);
    } else {
      setMediaContent(`<img src="${src}" alt="" style="max-width:100%;max-height:100%;object-fit:contain;">`);
    }
  } else {
    showChooser();
  }

  // Drawing inside frame
  setupFrameDrawing(frame);

  // Drag & resize
  const header = frame.querySelector('.sb-frame-header');
  makeDraggable(frame, header);
  makeResizable(frame, () => resizeSbCanvas(frame));

  resizeSbCanvas(frame);

  // Bring to front on click
  frame.addEventListener('mousedown', () => {
    document.querySelectorAll('.sb-frame').forEach(f => f.style.zIndex = 40);
    frame.style.zIndex = 45;
  });

  return frame;
}

function resizeSbCanvas(frame) {
  const c = frame.querySelector('.sb-draw-canvas');
  if (!c) return;
  const pane = frame.querySelector('[data-pane="draw"]');
  if (!pane) return;
  const pw = pane.offsetWidth, ph = pane.offsetHeight;
  if (pw < 10 || ph < 10) return;
  // Preserve drawing
  const tmp = document.createElement('canvas');
  tmp.width = c.width; tmp.height = c.height;
  tmp.getContext('2d').drawImage(c, 0, 0);
  c.width = pw; c.height = ph;
  c.getContext('2d').drawImage(tmp, 0, 0);
}

function setupFrameDrawing(frame) {
  const c = frame.querySelector('.sb-draw-canvas');
  const fctx = c.getContext('2d');
  let drawing = false;

  c.addEventListener('pointerdown', e => {
    e.stopPropagation();
    if (state.tool === 'select') return; // allow only when not in select mode... actually frame draw is independent
    drawing = true;
    c.setPointerCapture(e.pointerId);
    const r = c.getBoundingClientRect();
    fctx.beginPath();
    fctx.moveTo((e.clientX - r.left), (e.clientY - r.top));
    fctx.strokeStyle = state.strokeColor;
    fctx.lineWidth = Math.max(1, state.brushSize * (e.pressure > 0 ? e.pressure * 2 : 1));
    fctx.lineCap = 'round'; fctx.lineJoin = 'round';
  });

  c.addEventListener('pointermove', e => {
    if (!drawing) return;
    const r = c.getBoundingClientRect();
    const pressure = e.pressure > 0 ? e.pressure : 0.5;
    fctx.lineWidth = Math.max(1, state.brushSize * pressure * 2);
    fctx.strokeStyle = state.strokeColor;
    fctx.lineTo((e.clientX - r.left), (e.clientY - r.top));
    fctx.stroke();
    fctx.beginPath();
    fctx.moveTo((e.clientX - r.left), (e.clientY - r.top));
  });

  c.addEventListener('pointerup', () => drawing = false);
  c.addEventListener('pointercancel', () => drawing = false);
}

document.getElementById('btn-add-frame').addEventListener('click', () => addFrame());

  el.className = 'canvas-label';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';

  const input = document.createElement('input');
  input.className = 'canvas-label-input';
  input.value = text || '';
  input.placeholder = 'Type here…';
  input.style.width = '200px';
  input.addEventListener('mousedown', e => e.stopPropagation());

  const del = document.createElement('button');
  del.className = 'lbl-del'; del.textContent = '✕';
  del.addEventListener('click', () => el.remove());

  el.appendChild(input);
  el.appendChild(del);
  infiniteCanvas.appendChild(el);
  makeDraggable(el, el);
  setTimeout(() => input.focus(), 50);
  return el;
}

// CANVAS IMAGES
// ═══════════════════════════════════════════════════════════
function addCanvasImage(src, x, y) {
  const el = document.createElement('div');
  el.className = 'canvas-image';
  el.style.left = (x ?? 400) + 'px';
  el.style.top  = (y ?? 300) + 'px';

  const img = document.createElement('img');
  img.src = src;
  img.draggable = false;

  const del = document.createElement('button');
  del.className = 'img-del'; del.textContent = '✕';
  del.addEventListener('click', () => el.remove());

  // Resize handle
  const resizeH = document.createElement('div');
  resizeH.className = 'sb-resize';
  resizeH.style.position = 'absolute';

  el.appendChild(img);
  el.appendChild(del);
  el.appendChild(resizeH);
  infiniteCanvas.appendChild(el);
  makeDraggable(el, el);

  // Resize image
  resizeH.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    const sx = e.clientX, sy = e.clientY;
    const sw = img.offsetWidth || 200, sh = img.offsetHeight || 200;
    const onMove = ev => {
      img.style.maxWidth = 'none';
      img.style.width  = Math.max(60, sw + (ev.clientX - sx) / state.zoom) + 'px';
      img.style.height = Math.max(60, sh + (ev.clientY - sy) / state.zoom) + 'px';
    };
    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  return el;
}

document.getElementById('btn-add-image').addEventListener('click', () => document.getElementById('image-input').click());
document.getElementById('image-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const pos = toCanvas(window.innerWidth / 2, window.innerHeight / 2);
    addCanvasImage(ev.target.result, pos.x - 150, pos.y - 100);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// ═══════════════════════════════════════════════════════════
// AUDIO / WAVEFORM
// ═══════════════════════════════════════════════════════════
let audioContext = null;
function getAudioContext() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  return audioContext;
}

function addWaveform(opts) {
  state.waveformCount++;
  const id = 'waveform-' + Date.now();
  const x = opts?.x ?? 200;
  const y = opts?.y ?? 300;
  const w = opts?.w ?? 700;
  const filename = opts?.filename ?? 'Audio Track';
  const samples = opts?.samples ?? null;

  const block = document.createElement('div');
  block.className = 'waveform-block';
  block.id = id;
  block.style.left = x + 'px';
  block.style.top  = y + 'px';
  block.style.width = w + 'px';

  block.innerHTML = `
    <div class="waveform-header">
      <span class="waveform-title">${filename}</span>
      <button class="waveform-ctrl" id="wc-play-${id}" title="Play/Pause">▶</button>
      <button class="waveform-ctrl" id="wc-stop-${id}" title="Stop">■</button>
      <div class="waveform-vol-wrap">
        <button class="waveform-vol-btn" id="wc-mute-${id}" title="Mute">🔊</button>
        <input class="waveform-vol-slider" id="wc-vol-${id}" type="range" min="0" max="1" step="0.01" value="1" title="Volume">
      </div>
      <button class="waveform-ctrl active" id="wc-lock-${id}" title="Lock position">⊟</button>
      <button class="waveform-ctrl" id="wc-del-${id}" title="Remove">✕</button>
    </div>
    <div class="waveform-body" id="wc-body-${id}">
      <canvas class="waveform-canvas" id="wc-canvas-${id}"></canvas>
      <div class="waveform-playhead" id="wc-head-${id}"></div>
    </div>
    <div class="waveform-resize-l" id="wc-rl-${id}"></div>
    <div class="waveform-resize-r" id="wc-rr-${id}"></div>
    <div class="waveform-resize-b" id="wc-rb-${id}"></div>
  `;

  infiniteCanvas.appendChild(block);

  const header   = block.querySelector('.waveform-header');
  const body     = block.querySelector('.waveform-body');
  const canvas   = block.querySelector('.waveform-canvas');
  const playhead = block.querySelector('.waveform-playhead');

  // ── Core model ───────────────────────────────────────────────
  // pxPerSec is the ONLY source of truth for time↔position mapping.
  // It is recomputed whenever the block is resized:
  //   pxPerSec = blockWidth / audioDuration
  // Playhead left (px) = currentTime * pxPerSec   ← never uses % or ratio
  // Scrub time (s)     = clickPxFromLeft / pxPerSec
  // Resizing changes pxPerSec and immediately repositions the playhead.

  const gainNode = getAudioContext().createGain();
  gainNode.gain.value = 1;
  gainNode.connect(getAudioContext().destination);

  const wState = {
    locked: false, audioBuffer: null, source: null,
    playing: false, startTime: 0, pauseOffset: 0,
    samples: null, volume: 1, muted: false,
  };

  // pxPerSec: derived from block width and audio duration.
  // Recomputed on every resize and after audio loads.
  function getPxPerSec() {
    if (!wState.audioBuffer) return 100;
    return body.offsetWidth / wState.audioBuffer.duration;
  }

  // ── Rendering ─────────────────────────────────────────────────
  function renderWaveform() {
    const W = body.offsetWidth || 600;
    const H = body.offsetHeight || 64;
    canvas.width  = W;
    canvas.height = H;
    const wctx = canvas.getContext('2d');

    // Background
    const grd = wctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#2a1a10');
    grd.addColorStop(1, '#1a1814');
    wctx.fillStyle = grd;
    wctx.fillRect(0, 0, W, H);

    if (!wState.samples || wState.samples.length === 0) {
      wctx.fillStyle = '#444';
      wctx.font = '11px DM Mono, monospace';
      wctx.textAlign = 'center';
      wctx.fillText('Loading…', W / 2, H / 2 + 4);
      return;
    }

    const samps = wState.samples;
    const mid   = H / 2;
    for (let i = 0; i < W; i++) {
      // Map pixel column → sample index proportionally
      const si = Math.floor(i / W * samps.length);
      const amp = samps[si] || 0;
      const h   = Math.max(1, amp * (H - 4));
      const gbar = wctx.createLinearGradient(0, mid - h/2, 0, mid + h/2);
      gbar.addColorStop(0,   '#f0a030');
      gbar.addColorStop(0.5, '#e8500a');
      gbar.addColorStop(1,   '#f0a030');
      wctx.fillStyle = gbar;
      wctx.fillRect(i, mid - h/2, 1, h);
    }

    // Centre line
    wctx.strokeStyle = '#2a2620';
    wctx.lineWidth   = 1;
    wctx.beginPath();
    wctx.moveTo(0, mid); wctx.lineTo(W, mid);
    wctx.stroke();

    // Time ruler — tick every second, label every 5s
    if (wState.audioBuffer) {
      const pps = getPxPerSec();
      const dur = wState.audioBuffer.duration;
      wctx.fillStyle = '#555';
      wctx.font = '8px DM Mono, monospace';
      wctx.textAlign = 'center';
      for (let s = 0; s <= Math.ceil(dur); s++) {
        const x = s * pps;
        if (x > W) break;
        const tickH = s % 5 === 0 ? 8 : 4;
        wctx.fillStyle = '#444';
        wctx.fillRect(x, H - tickH - 1, 1, tickH);
        if (s % 5 === 0 && x > 12) {
          wctx.fillStyle = '#666';
          const m = Math.floor(s/60), sc = s%60;
          wctx.fillText(`${m}:${sc.toString().padStart(2,'0')}`, x, H - 10);
        }
      }
    }

    // Re-pin playhead after redraw
    updatePlayheadPos();
  }

  // ── Playhead positioning ──────────────────────────────────────
  // ONLY function that sets playhead.style.left.
  // Input: time in seconds → output: px from left edge of body.
  function updatePlayheadPos() {
    const t   = currentTime();
    const px  = t * getPxPerSec();
    playhead.style.left = px + 'px';
  }

  // ── Playback time ─────────────────────────────────────────────
  function currentTime() {
    if (!wState.playing) return wState.pauseOffset;
    const elapsed = getAudioContext().currentTime - wState.startTime + wState.pauseOffset;
    return Math.min(elapsed, wState.audioBuffer ? wState.audioBuffer.duration : elapsed);
  }

  // ── Animation loop ────────────────────────────────────────────
  let animId = null;
  function tick() {
    updatePlayheadPos();
    if (wState.audioBuffer && currentTime() < wState.audioBuffer.duration) {
      animId = requestAnimationFrame(tick);
    } else if (wState.playing) {
      stopAudio();
    }
  }

  // ── Playback controls ─────────────────────────────────────────
  function playAudio() {
    if (!wState.audioBuffer || wState.playing) return;
    getAudioContext().resume();
    wState.source = getAudioContext().createBufferSource();
    wState.source.buffer = wState.audioBuffer;
    wState.source.connect(gainNode);
    wState.source.start(0, wState.pauseOffset);
    wState.startTime = getAudioContext().currentTime;
    wState.playing   = true;
    block.querySelector(`#wc-play-${id}`).textContent = '⏸';
    tick();
  }

  function pauseAudio() {
    if (!wState.playing) return;
    wState.pauseOffset = currentTime();
    try { wState.source.stop(); } catch(e) {}
    wState.playing = false;
    block.querySelector(`#wc-play-${id}`).textContent = '▶';
    cancelAnimationFrame(animId);
  }

  function stopAudio() {
    if (wState.source && wState.playing) { try { wState.source.stop(); } catch(e) {} }
    wState.playing     = false;
    wState.pauseOffset = 0;
    block.querySelector(`#wc-play-${id}`).textContent = '▶';
    cancelAnimationFrame(animId);
    updatePlayheadPos();
  }

  block.querySelector(`#wc-play-${id}`).addEventListener('click', () => wState.playing ? pauseAudio() : playAudio());
  block.querySelector(`#wc-stop-${id}`).addEventListener('click', stopAudio);
  block.querySelector(`#wc-del-${id}`).addEventListener('click', () => { stopAudio(); block.remove(); });

  // ── Volume ────────────────────────────────────────────────────
  const volSlider = block.querySelector(`#wc-vol-${id}`);
  const muteBtn   = block.querySelector(`#wc-mute-${id}`);
  function applyVolume() {
    gainNode.gain.value = wState.muted ? 0 : wState.volume;
    muteBtn.textContent = wState.muted ? '🔇' : wState.volume < 0.5 ? '🔉' : '🔊';
    muteBtn.classList.toggle('muted', wState.muted);
  }
  volSlider.addEventListener('input', e => {
    wState.volume = parseFloat(e.target.value);
    if (wState.muted && wState.volume > 0) wState.muted = false;
    applyVolume();
  });
  volSlider.addEventListener('mousedown', e => e.stopPropagation());
  muteBtn.addEventListener('click', () => { wState.muted = !wState.muted; applyVolume(); });

  // ── Lock ──────────────────────────────────────────────────────
  const lockBtn = block.querySelector(`#wc-lock-${id}`);
  lockBtn.addEventListener('click', () => {
    wState.locked = !wState.locked;
    block.classList.toggle('locked', wState.locked);
    lockBtn.title       = wState.locked ? 'Unlock position' : 'Lock position';
    lockBtn.textContent = wState.locked ? '🔒' : '⊟';
    header.style.cursor = wState.locked ? 'default' : 'move';
  });

  // ── Scrubbing ─────────────────────────────────────────────────
  // clientX → canvas-space px from left edge of body → seconds
  // Uses getBoundingClientRect for left edge (screen space),
  // then divides by state.zoom to get canvas-space px.
  body.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    function seek(ev) {
      if (!wState.audioBuffer) return;
      const r      = body.getBoundingClientRect();
      const screenPx = ev.clientX - r.left;        // px from left in screen space
      const canvasPx = screenPx / state.zoom;       // px from left in canvas space
      const t = Math.max(0, Math.min(
        wState.audioBuffer.duration,
        canvasPx / getPxPerSec()
      ));
      const wasPlaying = wState.playing;
      if (wasPlaying) { try { wState.source.stop(); } catch(e){} cancelAnimationFrame(animId); wState.playing = false; }
      wState.pauseOffset = t;
      updatePlayheadPos();
      if (wasPlaying) playAudio();
    }
    seek(e);
    const onMove = ev => seek(ev);
    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  // ── Resize handles ────────────────────────────────────────────
  // Stretching changes the visual scale (pxPerSec) which changes how much
  // of the song is visible. Playhead is immediately repositioned.
  function makeResizeHandle(handleEl, side) {
    handleEl.addEventListener('mousedown', e => {
      if (wState.locked) return;
      e.stopPropagation(); e.preventDefault();
      const startX  = e.clientX;
      const startW  = parseFloat(block.style.width) || block.offsetWidth;
      const startL  = parseFloat(block.style.left)  || 0;
      const onMove  = ev => {
        const dx = (ev.clientX - startX) / state.zoom;
        if (side === 'r') {
          block.style.width = Math.max(200, startW + dx) + 'px';
        } else {
          const newW = Math.max(200, startW - dx);
          block.style.left  = (startL + startW - newW) + 'px';
          block.style.width = newW + 'px';
        }
        renderWaveform(); // redraws ruler + repositions playhead
      };
      const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });
  }
  makeResizeHandle(block.querySelector(`#wc-rl-${id}`), 'l');
  makeResizeHandle(block.querySelector(`#wc-rr-${id}`), 'r');

  // Bottom edge — drag to change height
  const resizeB = block.querySelector(`#wc-rb-${id}`);
  resizeB.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    const startY = e.clientY;
    const startH = block.offsetHeight;
    const onMove = ev => {
      const dy = (ev.clientY - startY) / state.zoom;
      block.style.height = Math.max(60, startH + dy) + 'px';
      renderWaveform();
    };
    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  // ── Drag ──────────────────────────────────────────────────────
  makeDraggable(block, header, null);
  header.addEventListener('mousedown', e => { if (wState.locked) e.stopImmediatePropagation(); }, true);

  // ── Load samples ──────────────────────────────────────────────
  function loadSamples(buffer) {
    wState.audioBuffer = buffer;
    const data = buffer.getChannelData(0);
    const targetSamples = 4000;
    const step = Math.max(1, Math.floor(data.length / targetSamples));
    const s = [];
    for (let i = 0; i < targetSamples; i++) s.push(Math.abs(data[i * step] || 0));
    wState.samples = s;
    requestAnimationFrame(renderWaveform);
  }

  // Initial render
  requestAnimationFrame(renderWaveform);

  return { block, wState, loadSamples };
}

document.getElementById('btn-add-audio').addEventListener('click', () => document.getElementById('audio-input').click());
document.getElementById('audio-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const pos = toCanvas(window.innerWidth / 2, (window.innerHeight - 84) * 0.6);
  const { block, wState, loadSamples } = addWaveform({ x: pos.x - 300, y: pos.y, filename: file.name });
  document.getElementById('status-audio-info').innerHTML = `AUDIO: <span>${file.name}</span>`;

  const reader = new FileReader();
  reader.onload = ev => {
    getAudioContext().decodeAudioData(ev.target.result.slice(0), buf => loadSamples(buf));
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

const dropOverlay = document.getElementById('drop-overlay');
container.addEventListener('dragenter', e => { e.preventDefault(); dropOverlay.classList.add('visible'); });
container.addEventListener('dragleave', e => { if (e.relatedTarget === null || !container.contains(e.relatedTarget)) dropOverlay.classList.remove('visible'); });
container.addEventListener('dragover', e => e.preventDefault());
container.addEventListener('drop', e => {
  e.preventDefault();
  dropOverlay.classList.remove('visible');
  const pos = toCanvas(e.clientX, e.clientY);
  Array.from(e.dataTransfer.files).forEach(file => {
    if (file.type.startsWith('audio/') || file.name.match(/\.(mp3|wav|ogg|flac|aac|m4a)$/i)) {
      const { block, loadSamples } = addWaveform({ x: pos.x - 300, y: pos.y, filename: file.name });
      const reader = new FileReader();
      reader.onload = ev => { getAudioContext().decodeAudioData(ev.target.result.slice(0), buf => loadSamples(buf)); };
      reader.readAsArrayBuffer(file);
    } else if (file.type.startsWith('image/') || file.name.match(/\.(jpg|jpeg|png|gif|webp|tiff|tif|bmp)$/i)) {
      const reader = new FileReader();
      reader.onload = ev => addCanvasImage(ev.target.result, pos.x, pos.y);
      reader.readAsDataURL(file);
    }
  });
});

function saveProject() {
  const proj = {
    version: 1,
    pan: { x: container.scrollLeft, y: container.scrollTop, zoom: state.zoom },
    zoom: state.zoom,
    frames: [],
    labels: [],
    images: [],
    drawingData: drawCanvas.toDataURL(),
    strokeHistory: strokeHistory.map(s => ({
      points: s.points,
      color: s.color,
      isErase: s.isErase,
      offsetX: s.offsetX || 0,
      offsetY: s.offsetY || 0,
    })),
  };

  // Frames
  document.querySelectorAll('.sb-frame').forEach(frame => {
    const title = frame.querySelector('.sb-frame-title').value;
    const activeTab = frame.querySelector('.sb-tab.active')?.dataset.tab ?? 'draw';
    const textContent = frame.querySelector('.sb-text-area')?.value ?? '';
    const imgEl = frame.querySelector('[data-pane="image"] img');
    const vidEl = frame.querySelector('[data-pane="image"] video');
    const ifrEl = frame.querySelector('[data-pane="image"] iframe');
    const drawC = frame.querySelector('.sb-draw-canvas');
    let imgSrc = null;
    if (imgEl) imgSrc = imgEl.src;
    else if (vidEl) imgSrc = vidEl.src;
    else if (ifrEl) {
      const ytMatch = ifrEl.src.match(/embed\/([a-zA-Z0-9_-]{11})/);
      if (ytMatch) imgSrc = 'yt:' + ytMatch[1];
    }
    proj.frames.push({
      x: parseFloat(frame.style.left), y: parseFloat(frame.style.top),
      w: frame.offsetWidth, h: frame.offsetHeight,
      title, activeTab, textContent,
      imgSrc,
      drawData: drawC ? drawC.toDataURL() : null,
    });
  });

  // Labels
  document.querySelectorAll('.canvas-label').forEach(lbl => {
    proj.labels.push({
      x: parseFloat(lbl.style.left), y: parseFloat(lbl.style.top),
      text: lbl.querySelector('input').value,
    });
  });

  // Canvas images
  document.querySelectorAll('.canvas-image').forEach(ci => {
    const img = ci.querySelector('img');
    proj.images.push({
      x: parseFloat(ci.style.left), y: parseFloat(ci.style.top),
      src: img.src, w: img.style.width, h: img.style.height,
    });
  });

  const blob = new Blob([JSON.stringify(proj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'musicboard-project.json';
  a.click();
}

function loadProject(proj) {
  // Clear existing
  document.querySelectorAll('.sb-frame, .canvas-label, .canvas-image, .waveform-block').forEach(el => el.remove());
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  state.frameCount = 0; state.labelCount = 0; state.imageCount = 0;

  const _cw = window.innerWidth, _ch = window.innerHeight - 86 - 26;
  state.zoom = proj.pan?.zoom ?? Math.max(getMinZoom(), 1);
  state.zoom = Math.max(getMinZoom(), state.zoom);
  applyTransform();
  // Restore scroll position, defaulting to canvas centre
  container.scrollLeft = proj.pan?.x ?? (CANVAS_SIZE * state.zoom / 2 - _cw / 2);
  container.scrollTop  = proj.pan?.y ?? (CANVAS_SIZE * state.zoom / 2 - _ch / 2);
  state.zoom = proj.zoom ?? 1;
  applyTransform();

  // Restore stroke history (vector) — preferred over raster fallback
  strokeHistory = [];
  selectedStroke = null;
  octx.clearRect(0, 0, overlay.width, overlay.height);
  if (proj.strokeHistory && proj.strokeHistory.length > 0) {
    strokeHistory = proj.strokeHistory;
    redrawAllStrokes();
  } else if (proj.drawingData) {
    // Legacy raster fallback for old saves
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = proj.drawingData;
  }

  (proj.frames || []).forEach(f => {
    const frame = addFrame(f);
    // Restore draw canvas
    if (f.drawData) {
      const dc = frame.querySelector('.sb-draw-canvas');
      const img = new Image();
      img.onload = () => { resizeSbCanvas(frame); dc.getContext('2d').drawImage(img, 0, 0, dc.width, dc.height); };
      img.src = f.drawData;
    }
  });

  (proj.labels || []).forEach(l => addLabel(l.x, l.y, l.text));

  (proj.images || []).forEach(im => {
    const el = addCanvasImage(im.src, im.x, im.y);
    const img = el.querySelector('img');
    if (im.w) { img.style.maxWidth = 'none'; img.style.width = im.w; }
    if (im.h) img.style.height = im.h;
  });
}

let tutorialFrame = null;

function openTutorial() {
  // If already on canvas, just scroll to it and bring to front
  if (tutorialFrame && document.contains(tutorialFrame)) {
    tutorialFrame.style.zIndex = 200;
    // Pan canvas so tutorial is visible
    const tx = parseFloat(tutorialFrame.style.left) || 100;
    const ty = parseFloat(tutorialFrame.style.top)  || 100;
    container.scrollLeft = tx * state.zoom - window.innerWidth  / 2 + 200;
    container.scrollTop  = ty * state.zoom - (window.innerHeight - 84) / 2 + 150;
    return;
  }
  // Create it near current view centre
  const cx = (container.scrollLeft + window.innerWidth  / 2) / state.zoom - 220;
  const cy = (container.scrollTop  + (window.innerHeight - 84) / 2) / state.zoom - 300;
  tutorialFrame = addFrame({
    x: cx, y: cy, w: 440, h: 600,
    title: 'How To Use MusicBoard',
    activeTab: 'text',
    textContent: TUTORIAL_TEXT,
  });
  tutorialFrame.style.zIndex = 200;
  // Make textarea monospaced and slightly smaller for the dense text
  const ta = tutorialFrame.querySelector('.sb-text-area');
  ta.style.fontSize = '11px';
  ta.style.lineHeight = '1.7';
  ta.style.whiteSpace = 'pre';
}
