<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MusicBoard — Video Storyboard Studio</title>

<!-- SEO & sharing -->
<meta name="description" content="A freeform storyboarding tool for music videos. Infinite canvas, audio waveforms, drawing tablet support, and storyboard frames.">
<meta name="author" content="MusicBoard">
<meta property="og:title" content="MusicBoard — Video Storyboard Studio">
<meta property="og:description" content="A freeform storyboarding canvas for music videos and video directors.">
<meta property="og:type" content="website">

<!-- PWA -->
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MusicBoard">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- Fonts — preconnect for speed, swap prevents invisible text during load -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --canvas-bg: #ffffff;
    --panel: #ffffff;
    --panel2: #f8fafc;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent2: #60a5fa;
    --text: #1e293b;
    --text-inv: #ffffff;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --frame-bg: #ffffff;
    --frame-border: #e2e8f0;
    --waveform-bg: #ffffff;
    --waveform-wave: #3b82f6;
    --waveform-playhead: #60a5fa;
    --shadow: 0 4px 16px rgba(30,41,59,0.10);
    --shadow-sm: 0 2px 8px rgba(30,41,59,0.07);
    --shadow-btn: 0 1px 3px rgba(30,41,59,0.10), 0 1px 2px rgba(30,41,59,0.06);
    --radius: 8px;
    --radius-sm: 6px;
    --radius-lg: 12px;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    user-select: none;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: var(--panel);
    display: flex; align-items: center; gap: 0;
    z-index: 1000;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(30,41,59,0.06);
    overflow: hidden;
  }

  #logo {
    padding: 0 18px;
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-weight: 800; font-size: 15px;
    color: var(--text);
    letter-spacing: -0.01em;
    border-right: 1px solid var(--border);
    height: 100%; display: flex; align-items: center;
    white-space: nowrap; flex-shrink: 0;
  }
  #logo span { color: var(--accent); }

  .tb-group {
    display: flex; align-items: center;
    height: 100%;
    border-right: 1px solid var(--border);
    padding: 0 8px; gap: 3px;
    flex-shrink: 0;
  }

  .tb-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-muted); width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.15s;
    position: relative;
  }
  .tb-btn:hover {
    background: var(--bg); color: var(--text);
    box-shadow: var(--shadow-btn);
  }
  .tb-btn.active {
    background: var(--accent); color: #fff;
    box-shadow: 0 2px 6px rgba(59,130,246,0.35);
  }
  .tb-btn:hover img, .tb-btn.active img { filter: brightness(0) invert(1); }
  .tb-btn[title]:hover::after {
    content: attr(title);
    position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; font-size: 11px; padding: 4px 8px;
    border-radius: var(--radius-sm); white-space: nowrap; pointer-events: none;
    font-family: 'Inter', sans-serif; font-weight: 500;
    box-shadow: var(--shadow-sm);
  }

  .tb-sep { width: 1px; background: var(--border); height: 24px; margin: 0 4px; }

  #color-picker-wrap {
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    border-right: 1px solid var(--border); height: 100%;
    flex-shrink: 0;
  }
  #color-picker-wrap label {
    color: var(--text-muted); font-size: 10px; font-weight: 500;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  #stroke-color, #fill-color {
    width: 26px; height: 26px;
    border: 2px solid var(--border-strong);
    border-radius: 50%; cursor: pointer; padding: 0; background: none;
    box-shadow: var(--shadow-btn);
    transition: transform 0.1s;
  }
  #stroke-color:hover, #fill-color:hover { transform: scale(1.1); }
  #fill-toggle {
    background: white; border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text-muted); font-size: 10px; font-weight: 500;
    padding: 3px 8px; cursor: pointer;
    font-family: 'Inter', sans-serif;
    white-space: nowrap; transition: all 0.15s;
    box-shadow: var(--shadow-btn);
  }
  #fill-toggle.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; box-shadow: 0 2px 6px rgba(59,130,246,0.35);
  }

  /* Shape sub-tool picker */
  #shape-picker {
    display: none; align-items: center; gap: 3px;
    padding: 0 8px; border-right: 1px solid var(--border); height: 100%;
  }
  #shape-picker.visible { display: flex; }
  .shape-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-muted); width: 30px; height: 30px;
    border-radius: var(--radius-sm); display: flex; align-items: center;
    justify-content: center; font-size: 14px;
    transition: all 0.15s;
  }
  .shape-btn:hover { background: var(--bg); color: var(--text); box-shadow: var(--shadow-btn); }
  .shape-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 6px rgba(59,130,246,0.35); }

  #brush-size-wrap {
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    border-right: 1px solid var(--border); height: 100%;
    flex-shrink: 0;
  }
  #pressure-wrap {
    display: flex; align-items: center; padding: 0 10px;
    border-right: 1px solid var(--border); height: 100%;
    flex-shrink: 0;
  }
  #btn-pressure.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; box-shadow: 0 2px 8px rgba(59,130,246,0.4);
  }
  #brush-size-wrap label {
    color: var(--text-muted); font-size: 10px; font-weight: 500;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  #brush-size { width: 80px; accent-color: var(--accent); cursor: pointer; }

  #toolbar-right {
    margin-left: auto; display: flex; align-items: center; gap: 6px; padding: 0 14px;
  }
  .tb-btn-text {
    background: white; border: 1px solid var(--border-strong); cursor: pointer;
    color: var(--text-muted); padding: 5px 12px; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s; white-space: nowrap;
    box-shadow: var(--shadow-btn);
  }
  .tb-btn-text:hover { background: var(--bg); color: var(--text); border-color: var(--accent); }
  .tb-btn-text.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 2px 8px rgba(59,130,246,0.4);
  }
  .tb-btn-text.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .tb-btn-text:disabled {
    opacity: 0.38; cursor: default; pointer-events: none;
  }

  /* ── WORKSPACE TABS ── */
  #tab-bar {
    position: fixed; top: 52px; left: 0; right: 0; height: 34px; /* total header: 86px */
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: stretch; z-index: 999;
    overflow-x: auto; overflow-y: hidden;
    scrollbar-width: none;
  }
  #tab-bar::-webkit-scrollbar { display: none; }

  .ws-tab {
    display: flex; align-items: center; gap: 6px;
    padding: 0 14px; min-width: 100px; max-width: 160px;
    background: transparent; border-right: 1px solid var(--border);
    cursor: pointer; font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 500;
    color: var(--text-muted); white-space: nowrap;
    flex-shrink: 0; position: relative;
    transition: background 0.12s, color 0.12s;
  }
  .ws-tab:hover { background: var(--bg); color: var(--text); }
  .ws-tab.active {
    background: var(--panel); color: var(--text);
    border-bottom: 2px solid var(--accent);
    margin-bottom: -1px;
    box-shadow:
      0 -2px 8px rgba(30,41,59,0.10),
      2px 0 6px rgba(30,41,59,0.06),
      -2px 0 6px rgba(30,41,59,0.06),
      0 -1px 0 var(--panel) inset;
  }
  .ws-tab-name {
    flex: 1; overflow: hidden; text-overflow: ellipsis;
    outline: none; background: none; border: none;
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
    color: inherit; cursor: pointer; pointer-events: none;
  }
  .ws-tab.active .ws-tab-name { pointer-events: all; cursor: text; }
  .ws-tab-close {
    background: none; border: none; color: var(--text-muted);
    font-size: 13px; cursor: pointer; padding: 0 3px;
    line-height: 1; border-radius: 4px; flex-shrink: 0;
    transition: all 0.12s;
  }
  .ws-tab-close:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
  #tab-add {
    background: none; border: none; color: var(--text-muted);
    font-size: 20px; padding: 0 14px; cursor: pointer;
    flex-shrink: 0; transition: color 0.12s;
    display: flex; align-items: center;
  }
  #tab-add:hover { color: var(--accent); }
  #tab-add:disabled { color: var(--border-strong); cursor: default; }

  /* ── CANVAS AREA ── */
  #canvas-container {
    position: fixed; top: 86px; left: 0; right: 0; bottom: 26px;
    overflow: scroll; cursor: default;
    background-color: var(--canvas-bg);
    /* Prevent browser from claiming pen/touch for scrolling — we handle it */
    touch-action: pan-x pan-y;
  }

  /* Scrollbar styling */
  #canvas-container::-webkit-scrollbar { width: 10px; height: 10px; }
  #canvas-container::-webkit-scrollbar-track { background: var(--bg); }
  #canvas-container::-webkit-scrollbar-thumb {
    background: var(--border-strong); border-radius: 8px;
    border: 2px solid var(--bg);
  }
  #canvas-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  #canvas-container::-webkit-scrollbar-corner { background: var(--bg); }

  /* Scroll wrapper sets the scrollable area size based on zoom */
  #scroll-wrapper {
    position: relative;
    width: 8000px; height: 8000px;
    transform-origin: 0 0;
    touch-action: none; /* pen events handled by JS */
  }

  #infinite-canvas {
    position: absolute; top: 0; left: 0;
    width: 8000px; height: 8000px;
  }

  /* Drawing canvas sits on top of everything in infinite space */
  #draw-canvas {
    position: absolute; top: 0; left: 0;
    width: 8000px; height: 8000px;
    pointer-events: none;
    z-index: 5;
  }
  #draw-canvas.drawing-mode { pointer-events: all; cursor: crosshair; }

  /* Screen-resolution overlay for low-latency live strokes */
  #stroke-overlay {
    position: fixed;
    top: 86px; left: 0;   /* sits over canvas-container, below toolbar+tabbar */
    pointer-events: none;
    z-index: 6;
  }
  #stroke-overlay.drawing-mode { pointer-events: all; cursor: crosshair; z-index: 999; }

  /* ── WAVEFORM ── */
  .waveform-block {
    position: absolute;
    background: var(--frame-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-width: 300px; min-height: 60px; height: 90px;
    z-index: 50;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .waveform-block:hover { box-shadow: 0 8px 24px rgba(30,41,59,0.14); }
  .waveform-block[data-pinned="true"] { border-color: var(--accent); }

  .waveform-header {
    height: 36px; background: var(--panel2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 10px; gap: 6px;
    cursor: move; flex-shrink: 0;
  }
  .waveform-block[data-pinned="true"] .waveform-header { cursor: default; }
  .waveform-title {
    font-size: 12px; color: var(--text); font-family: 'Inter', sans-serif;
    font-weight: 600;
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .waveform-ctrl {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 16px; padding: 2px 6px;
    border-radius: var(--radius-sm); line-height: 1;
    transition: all 0.12s;
  }
  .waveform-ctrl:hover { color: var(--text); background: var(--bg); }
  .waveform-ctrl.active { color: var(--accent); }
  .waveform-ctrl.pinned {
    background: var(--accent); color: #fff;
    box-shadow: 0 1px 4px rgba(59,130,246,0.5);
  }
  .waveform-ctrl.pinned:hover { background: #2563eb; }

  .waveform-vol-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 0 6px;
  }
  .waveform-vol-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 16px; line-height: 1;
    padding: 2px 4px; border-radius: var(--radius-sm); transition: all 0.12s;
    flex-shrink: 0;
  }
  .waveform-vol-btn:hover { color: var(--text); background: var(--bg); }
  .waveform-vol-btn.muted { color: #ef4444; }
  .waveform-vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 3px; border-radius: 8px;
    background: var(--border); outline: none; cursor: pointer;
    accent-color: var(--accent);
  }
  .waveform-vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    border: 2px solid white;
    box-shadow: var(--shadow-btn);
  }
  .waveform-vol-slider::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid white;
  }

  .waveform-body {
    flex: 1; position: relative; overflow: hidden;
    cursor: col-resize;
  }
  /* Canvas fills the body exactly — width set by JS to match block */
  .waveform-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; display: block;
  }
  /* Playhead: absolute px position set by JS from currentTime × pxPerSec */
  .waveform-playhead {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--waveform-playhead);
    pointer-events: none; left: 0; z-index: 2;
    will-change: left;
  }
  /* Resize handles on left and right edges */
  .waveform-resize-l, .waveform-resize-r {
    position: absolute; top: 52px; bottom: 0; width: 12px;
    cursor: ew-resize; z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }
  .waveform-resize-l { left: 0; }
  .waveform-resize-r { right: 0; }
  .waveform-resize-l::after, .waveform-resize-r::after {
    content: '⋮'; color: var(--border-strong); font-size: 13px; pointer-events: none;
  }
  .waveform-resize-b {
    position: absolute; bottom: 0; left: 12px; right: 12px; height: 8px;
    cursor: ns-resize; z-index: 3;
  }
  .waveform-resize-b::after {
    content: ''; display: block; margin: 3px auto 0;
    width: 28px; height: 2px;
    border-radius: 4px; background: var(--border-strong);
  }

  /* ── Waveform floating control panel ── */
  .wf-ctrl-panel {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    pointer-events: all;
    user-select: none;
  }
  .wf-ctrl-panel-header {
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    height: 24px;
    display: flex; align-items: center;
    padding: 0 6px; gap: 4px;
    cursor: move; flex-shrink: 0;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .wf-ctrl-panel-drag {
    flex: 1; color: var(--border-strong);
    font-size: 11px; letter-spacing: 1px;
    pointer-events: none;
  }
  .wf-ctrl-panel-drag::before { content: '⠿'; }
  .wf-ctrl-panel-body {
    display: flex; align-items: center;
    padding: 4px 6px; gap: 0;
  }
  .wf-c-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 17px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    transition: color 0.1s, background 0.1s;
    flex-shrink: 0; line-height: 1;
  }
  .wf-c-btn:hover { color: var(--accent); background: var(--bg); }
  .wf-c-btn.playing { color: var(--accent); }
  .wf-c-btn.muted   { color: #ef4444; }
  .wf-c-sep {
    width: 1px; height: 16px;
    background: var(--border); margin: 0 3px; flex-shrink: 0;
  }
  .wf-c-vol {
    width: 55px; -webkit-appearance: none; appearance: none;
    height: 3px; border-radius: 8px;
    background: var(--border); outline: none; cursor: pointer;
    accent-color: var(--accent); flex-shrink: 0;
  }
  .wf-c-vol::-webkit-slider-thumb {
    -webkit-appearance: none; width: 11px; height: 11px;
    border-radius: 50%; background: var(--accent);
    border: 2px solid white; cursor: pointer;
  }
  .wf-c-vol::-moz-range-thumb {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--accent); border: 2px solid white;
  }




  /* ── STORYBOARD FRAMES ── */
  .sb-frame {
    position: absolute;
    background: var(--frame-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-width: 160px; min-height: 120px;
    box-shadow: var(--shadow);
    z-index: 40;
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .sb-frame:hover {
    z-index: 45;
    box-shadow: 0 8px 24px rgba(30,41,59,0.14);
  }

  .sb-frame-header {
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    height: 36px; display: flex; align-items: center;
    padding: 0 10px; gap: 6px; cursor: move; flex-shrink: 0;
  }
  .sb-frame-title {
    flex: 1; font-size: 12px; color: var(--text);
    font-family: 'Inter', sans-serif; font-weight: 600;
    background: none; border: none; outline: none;
    cursor: default; letter-spacing: 0em; min-width: 0;
    pointer-events: none;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sb-frame-title.editing {
    cursor: text; pointer-events: all;
    background: white; border-radius: 4px;
    padding: 1px 5px; border: 1px solid var(--accent);
  }
  .sb-frame-title::placeholder { color: var(--text-muted); }
  .sb-frame-title:focus {
    background: white; border-radius: 4px;
    padding: 1px 5px; border: 1px solid var(--accent);
  }
  .sb-frame-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 12px; padding: 2px 4px;
    line-height: 1; transition: all 0.12s; border-radius: 4px;
  }
  .sb-frame-btn:hover { background: var(--bg); color: var(--text); }
  .sb-frame-btn.del:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
  .sb-frame-btn.pin { color: var(--text-muted); font-size: 14px; }
  .sb-frame-btn.pin:hover { color: var(--accent); background: var(--bg); }
  .sb-frame-btn.pin.pinned {
    color: white; background: var(--accent);
    box-shadow: 0 1px 4px rgba(59,130,246,0.4);
  }
  .sb-frame-btn.pin.pinned:hover { background: var(--accent-hover); color: white; }

  /* Pin button for images and labels */
  .pin-btn {
    position: absolute; top: -8px; left: -8px;
    width: 20px; height: 20px; border-radius: 50%;
    background: white; border: 1px solid var(--border-strong);
    color: var(--text-muted); font-size: 11px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; box-shadow: var(--shadow-sm);
    transition: all 0.15s; z-index: 10;
    line-height: 1; padding: 0;
  }
  .pin-btn:hover { color: var(--accent); border-color: var(--accent); }
  .pin-btn.pinned { background: var(--accent); border-color: var(--accent); color: white; }
  .pinned-element { cursor: default !important; }
  .pinned-element .sb-frame-header { cursor: default !important; }

  .sb-frame-body {
    flex: 1; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* Tab bar inside frame */
  .sb-frame-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0;
  }
  .sb-tab {
    font-size: 10px; padding: 5px 12px; cursor: pointer;
    border: none; background: none;
    font-family: 'Inter', sans-serif; font-weight: 500;
    color: var(--text-muted); border-right: 1px solid var(--border);
    transition: all 0.12s;
  }
  .sb-tab.active {
    background: var(--frame-bg); color: var(--accent);
    border-bottom: 2px solid var(--accent); margin-bottom: -1px;
  }

  .sb-frame-content { flex: 1; position: relative; overflow: hidden; }

  /* Text tab */
  .sb-text-area {
    width: 100%; height: 100%; border: none; outline: none; resize: none;
    background: transparent; font-family: 'Inter', sans-serif;
    font-size: 12px; color: var(--text); padding: 10px 12px;
    line-height: 1.7;
  }

  /* Draw tab */
  .sb-draw-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    cursor: crosshair; touch-action: none;
  }

  /* Image tab */
  .sb-image-area {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; padding: 12px;
  }
  .sb-image-area img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--radius-sm); }
  .sb-media-video {
    max-width: 100%; max-height: 100%; display: block;
    background: #000; border-radius: var(--radius-sm);
  }
  .sb-media-iframe {
    width: 100%; height: 100%; border: none; display: block;
    min-height: 160px;
  }
  .sb-media-chooser {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; padding: 16px;
  }
  .sb-media-wrap {
    position: relative; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .sb-media-swap {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(255,255,255,0.92); color: var(--text-muted);
    border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 500;
    padding: 4px 10px; cursor: pointer; z-index: 10;
    opacity: 0; transition: opacity 0.15s;
    pointer-events: none; box-shadow: var(--shadow-sm);
  }
  .sb-media-wrap:hover .sb-media-swap {
    opacity: 1; pointer-events: all;
  }
  .sb-img-placeholder {
    color: var(--text-muted); font-size: 12px; text-align: center;
    pointer-events: none; font-family: 'Inter', sans-serif;
  }
  .sb-img-upload {
    font-size: 11px; font-weight: 500;
    padding: 6px 14px; border: 1px solid var(--border-strong);
    background: white; border-radius: var(--radius-sm); cursor: pointer;
    font-family: 'Inter', sans-serif; color: var(--text-muted);
    box-shadow: var(--shadow-btn); transition: all 0.12s;
  }
  .sb-img-upload:hover { background: var(--bg); color: var(--text); border-color: var(--accent); }

  /* Resize handle (bottom-right) */
  .sb-resize {
    position: absolute; bottom: 0; right: 0;
    width: 18px; height: 18px; cursor: se-resize;
    z-index: 2;
  }
  .sb-resize::after {
    content: '';
    position: absolute; bottom: 4px; right: 4px;
    width: 7px; height: 7px;
    border-right: 2px solid var(--border-strong);
    border-bottom: 2px solid var(--border-strong);
    border-radius: 1px;
  }

  /* ── CANVAS IMAGES ── */
  .canvas-image {
    position: absolute; cursor: move; z-index: 30;
    border: 2px solid transparent;
    border-radius: var(--radius-sm);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .canvas-image:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .canvas-image img { display: block; max-width: 400px; max-height: 400px; }
  .canvas-image .img-del {
    position: absolute; top: -10px; right: -10px;
    background: var(--accent); color: #fff; border: none;
    width: 20px; height: 20px; border-radius: 50%;
    font-size: 12px; cursor: pointer; display: none;
    align-items: center; justify-content: center; line-height: 1;
  }
  .canvas-image:hover .img-del { display: flex; }

  /* ── CANVAS TEXT LABELS ── */
  .canvas-label {
    position: absolute; z-index: 35;
    min-width: 80px; min-height: 28px;
    /* No chrome at rest — just text on canvas */
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius);
  }
  .canvas-label:hover, .canvas-label.active {
    background: rgba(255,255,255,0.85);
    border-color: var(--border);
    box-shadow: var(--shadow-sm);
  }
  /* Header floats ABOVE the label so it never shifts the text */
  .canvas-label-header {
    display: none;
    align-items: center;
    position: absolute;
    top: -26px; left: -1px; right: -1px;
    height: 24px; padding: 0 4px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    gap: 4px;
    box-shadow: 0 -2px 6px rgba(30,41,59,0.06);
  }
  .canvas-label:hover .canvas-label-header,
  .canvas-label.active .canvas-label-header {
    display: flex;
  }
  .canvas-label-drag {
    flex: 1; cursor: move; height: 100%;
    display: flex; align-items: center;
    color: var(--border-strong); font-size: 11px;
    letter-spacing: 2px; user-select: none;
    padding-left: 2px;
  }
  .canvas-label-drag::before { content: '⠿'; }
  .lbl-pin {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 12px;
    padding: 1px 3px; border-radius: 4px;
    line-height: 1; transition: all 0.12s;
  }
  .lbl-pin:hover { color: var(--accent); background: var(--bg); }
  .lbl-pin.pinned { color: white; background: var(--accent); }
  .lbl-del {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 11px;
    padding: 1px 3px; border-radius: 4px;
    line-height: 1; transition: all 0.12s;
  }
  .lbl-del:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
  .canvas-label-input {
    background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
    color: var(--text); width: 100%; height: 100%;
    cursor: text; padding: 4px 6px;
    display: block;
  }
  /* Resize handle: only visible on hover/active */
  .canvas-label .sb-resize {
    position: absolute; bottom: 0; right: 0;
    width: 18px; height: 18px; cursor: se-resize; z-index: 2;
    opacity: 0; transition: opacity 0.15s;
  }
  .canvas-label:hover .sb-resize,
  .canvas-label.active .sb-resize { opacity: 1; }
  .canvas-label .sb-resize::after {
    content: '';
    position: absolute; bottom: 4px; right: 4px;
    width: 7px; height: 7px;
    border-right: 2px solid var(--border-strong);
    border-bottom: 2px solid var(--border-strong);
    border-radius: 1px;
  }

  /* ── TEXT FORMAT POPUP ── */
  #text-format-popup {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: none; align-items: center; gap: 6px;
    padding: 5px 8px;
    z-index: 2000;
    pointer-events: all;
  }
  #text-format-popup.visible { display: flex; }
  .tfp-select {
    border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 11px;
    color: var(--text); background: white; cursor: pointer;
    padding: 3px 5px; outline: none;
    box-shadow: var(--shadow-btn);
  }
  .tfp-select:focus { border-color: var(--accent); }
  .tfp-color {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border-strong); cursor: pointer;
    padding: 0; background: none; box-shadow: var(--shadow-btn);
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .tfp-color:hover { transform: scale(1.1); }
  .tfp-sep {
    width: 1px; height: 20px; background: var(--border); flex-shrink: 0;
  }
  .tfp-label {
    font-size: 10px; color: var(--text-muted);
    font-family: 'Inter', sans-serif; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.04em;
  }

  /* Frame text tab formatting bar */
  .sb-text-format-bar {
    display: none; align-items: center; gap: 6px;
    padding: 5px 8px; border-bottom: 1px solid var(--border);
    background: var(--panel2); flex-shrink: 0;
  }
  .sb-text-format-bar.visible { display: flex; }

  /* ── STATUS BAR ── */
  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 26px;
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 14px; gap: 20px;
    z-index: 1000;
    box-shadow: 0 -1px 4px rgba(30,41,59,0.04);
  }
  .status-item { font-size: 10px; color: var(--text-muted); font-family: 'Inter', sans-serif; font-weight: 500; }
  .status-item span { color: var(--text); }
  #status-zoom.at-min { color: var(--accent); }
  #status-zoom.at-min::after { content: ' MIN'; font-size: 9px; opacity: 0.8; }

  /* ── HIDDEN INPUTS ── */
  #audio-input, #image-input, #project-input { display: none; }

  /* ── MODALS / OVERLAYS ── */
  .drop-overlay {
    position: fixed; inset: 86px 0 26px 0;
    background: rgba(59,130,246,0.06);
    border: 2px dashed var(--accent);
    border-radius: var(--radius-lg);
    margin: 12px;
    z-index: 2000; display: none;
    align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 20px; font-weight: 600;
    color: var(--accent); pointer-events: none;
  }
  .drop-overlay.visible { display: flex; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  /* ── EASTER EGG ── */
  #easter-egg-modal {
    position: fixed; inset: 0;
    background: rgba(30,41,59,0.5);
    z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #easter-egg-box {
    background: white;
    border-radius: var(--radius-lg);
    padding: 36px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(30,41,59,0.25);
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    max-width: 320px;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #easter-egg-emoji { font-size: 48px; line-height: 1; }
  #easter-egg-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 18px; color: var(--text);
  }
  #easter-egg-msg {
    font-family: 'Inter', sans-serif;
    font-size: 13px; color: var(--text-muted); line-height: 1.5;
  }
  #easter-egg-close {
    margin-top: 8px;
    background: var(--accent); color: white; border: none;
    padding: 10px 24px; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 13px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(59,130,246,0.4);
    transition: background 0.15s;
  }
  #easter-egg-close:hover { background: var(--accent-hover); }

  /* ── EXPORT ── */
  #export-popup {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white; border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 32px rgba(30,41,59,0.18);
    padding: 20px 24px; z-index: 2000;
    display: none; flex-direction: column; gap: 14px;
    min-width: 260px;
  }
  #export-popup.visible { display: flex; }
  #export-popup-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700; font-size: 15px; color: var(--text);
  }
  #export-popup-dims {
    font-size: 11px; color: var(--text-muted);
    font-family: 'Inter', sans-serif;
  }
  #export-popup-btns {
    display: flex; flex-direction: column; gap: 8px;
  }
  #export-popup-btns button {
    padding: 9px 16px; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 12px;
    font-weight: 500; cursor: pointer; transition: all 0.15s;
    border: 1px solid var(--border-strong);
    background: white; color: var(--text);
    box-shadow: var(--shadow-btn);
  }
  #export-popup-btns button:hover { background: var(--bg); border-color: var(--accent); }
  #btn-export-png { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 2px 8px rgba(59,130,246,0.35); }
  #btn-export-png:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  #btn-export-cancel { color: var(--text-muted); }

  /* file:// protocol notice */
  #file-notice {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--text); border: 1px solid #334155;
    color: #e2e8f0; font-size: 11px; font-family: 'Inter', sans-serif;
    font-weight: 500;
    padding: 8px 16px; border-radius: var(--radius); z-index: 2000;
    display: none; gap: 12px; align-items: center; white-space: nowrap;
    box-shadow: var(--shadow);
  }
  #file-notice.visible { display: flex; }
  #file-notice-close {
    background: none; border: none; color: #94a3b8; cursor: pointer;
    font-size: 14px; padding: 0 0 0 4px; line-height: 1;
    transition: color 0.12s;
  }
  #file-notice-close:hover { color: #fff; }
</style>
</head>

<!-- TOOLBAR -->
<div id="toolbar">

  <div class="tb-group">
